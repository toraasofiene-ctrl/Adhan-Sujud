<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Khanzab Pro</title>
    <style>
        :root {
            --emerald: #097969;
            --gold: #D4AF37;
            --black: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; overflow: hidden; background: var(--emerald); }

        /* ACCUEIL */
        #home-screen {
            display: flex; flex-direction: column; height: 100%; padding: 15px; color: white;
            background: radial-gradient(circle, var(--emerald) 0%, #043932 100%);
            border: 10px solid var(--gold); border-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h40v40H0V0zm20 20l10 10M10 30l10-10L10 10m20 0L20 20' stroke='%23D4AF37' fill='none'/%3E%3C/svg%3E") 30 repeat;
        }

        .header { text-align: center; }
        .header h1 { color: var(--gold); margin: 5px 0; font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* BOUSSOLE RÉELLE */
        .qibla-box { position: relative; width: 120px; height: 120px; margin: 10px auto; }
        #compass { width: 100%; height: 100%; transition: transform 0.2s ease-out; }
        .qibla-indicator { 
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 20px; height: 20px; background: red; clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        .prayer-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .prayer-row { background: rgba(255,255,255,0.1); border-bottom: 2px solid var(--gold); cursor: pointer; }
        .prayer-row td { padding: 12px; text-align: center; font-size: 1.1rem; }

        /* ECRAN DE PRIERE - PAYSAGE OPTIMISÉ */
        #prayer-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--black); color: white; z-index: 1000; flex-direction: row;
        }

        /* INFO : 1/4 de l'écran */
        #info-zone {
            width: 25%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-right: 2px solid #222;
            background: #0a0a0a;
        }
        .rakat-num { font-size: 6rem; font-weight: bold; color: var(--gold); line-height: 1; }
        .rakat-label { font-size: 1.2rem; opacity: 0.8; }

        /* ZONE TACTILE : 3/4 de l'écran */
        #touch-zone {
            width: 75%; height: 100%; position: relative;
            background: linear-gradient(90deg, #000 0%, #050505 100%);
            display: flex; justify-content: center; align-items: center;
        }

        .finger-hint {
            width: 150px; height: 150px; border: 5px dashed var(--gold);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            animation: pulse 2s infinite; opacity: 0.4;
        }
        .finger-hint::after { content: "POSEZ LE FRONT ICI"; font-size: 0.8rem; text-align: center; color: var(--gold); }

        .status-msg {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-size: 1.8rem; color: var(--gold); font-weight: bold; text-transform: uppercase;
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.4; } }

        .btn-close { position: absolute; top: 10px; left: 10px; background: #333; color: white; border: none; padding: 10px; z-index: 1001; }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="header">
            <h1>KHANZAB</h1>
            <div id="city-name" style="font-size: 0.8rem; opacity: 0.7;">Calcul de la position...</div>
        </div>

        <div class="qibla-box">
            <div class="qibla-indicator"></div>
            <svg id="compass" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="white" stroke-width="1" stroke-dasharray="2,2"/>
                <line x1="50" y1="5" x2="50" y2="20" stroke="gold" stroke-width="4" />
                <text x="50" y="60" text-anchor="middle" fill="white" font-size="10">KABA</text>
            </svg>
        </div>

        <table class="prayer-table" id="prayer-list">
            <!-- Rempli par JS -->
        </table>
        
        <div style="margin-top:auto; padding: 10px; text-align: center;">
            <small>Posez le téléphone à l'horizontale sur le côté du tapis.</small>
        </div>
    </div>

    <div id="prayer-screen">
        <button class="btn-close" onclick="stopPrayer()">Quitter</button>
        
        <div id="info-zone">
            <div class="rakat-label" id="p-name">FAJR</div>
            <div class="rakat-num"><span id="curr-r">1</span>/<span id="total-r">2</span></div>
            <div id="sujud-icons" style="font-size: 2rem; margin-top: 20px;">⚪ ⚪</div>
        </div>

        <div id="touch-zone">
            <div class="finger-hint"></div>
            <div id="msg-alert" class="status-msg"></div>
        </div>
    </div>

    <script>
        const prayers = [
            { id: 'Fajr', r: 2 }, { id: 'Dhuhr', r: 4 }, { id: 'Asr', r: 4 }, { id: 'Maghrib', r: 3 }, { id: 'Isha', r: 4 }
        ];

        let state = {
            isPraying: false, currR: 1, totalR: 0, currS: 0, lastT: 0,
            userLat: 0, userLon: 0, qiblaDir: 0
        };

        // --- AUDIO (VOIX HOMME) ---
        function say(text) {
            if (!window.speechSynthesis) return;
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            
            // Chercher une voix d'homme
            const voices = window.speechSynthesis.getVoices();
            const maleVoice = voices.find(v => v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('masculine'));
            if (maleVoice) msg.voice = maleVoice;
            
            msg.pitch = 0.8; // Baisser le ton pour faire plus masculin/grave
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        // --- BOUSSOLE & QIBLA ---
        function calculateQibla(lat, lon) {
            const latK = 21.4225 * Math.PI / 180;
            const lonK = 39.8262 * Math.PI / 180;
            const phi = lat * Math.PI / 180;
            const lambda = lon * Math.PI / 180;
            const y = Math.sin(lonK - lambda);
            const x = Math.cos(phi) * Math.tan(latK) - Math.sin(phi) * Math.cos(lonK - lambda);
            return Math.atan2(y, x) * 180 / Math.PI;
        }

        function initLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                state.userLat = pos.coords.latitude;
                state.userLon = pos.coords.longitude;
                state.qiblaDir = calculateQibla(state.userLat, state.userLon);
                document.getElementById('city-name').innerText = `GPS OK - Qibla: ${Math.round(state.qiblaDir)}°`;
                fetchTimes(pos.coords.latitude, pos.coords.longitude);
            });

            window.addEventListener('deviceorientationabsolute', e => {
                let heading = e.alpha || e.webkitCompassHeading;
                if (heading) {
                    const angle = heading - state.qiblaDir;
                    document.getElementById('compass').style.transform = `rotate(${-angle}deg)`;
                }
            });
        }

        // --- LOGIQUE PRIÈRE ---
        function startPrayer(id, r) {
            state.isPraying = true;
            state.currR = 1; state.totalR = r; state.currS = 0;
            document.getElementById('p-name').innerText = id;
            document.getElementById('total-r').innerText = r;
            document.getElementById('curr-r').innerText = 1;
            document.getElementById('prayer-screen').style.display = 'flex';
            updateUI();
            
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(()=>{});
            }
        }

        function stopPrayer() {
            state.isPraying = false;
            document.getElementById('prayer-screen').style.display = 'none';
        }

        const touchZone = document.getElementById('touch-zone');
        touchZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - state.lastT < 1000) return; // Verrouillage 1s
            state.lastT = now;
            
            handleStep();
        });

        function handleStep() {
            state.currS++;
            
            // Logique de fin de Rakat (au 2ème Sujud)
            if (state.currS === 2) {
                // Cas 1 : Fin de la prière (Dernière Rakat)
                if (state.currR === state.totalR) {
                    say("Allahou Akbar. At-tahiyyatou lillah. Salat Ibrahimia");
                    document.getElementById('msg-alert').innerText = "TACHAHOUD + SALAT IBRAHIMIA";
                    setTimeout(() => { alert("Prière terminée"); stopPrayer(); }, 5000);
                } 
                // Cas 2 : Deuxième Rakat (Prière > 2) -> Tachahoud Intermédiaire
                else if (state.currR === 2 && state.totalR > 2) {
                    say("Allahou Akbar. At-tahiyyatou lillah");
                    document.getElementById('msg-alert').innerText = "TACHAHOUD";
                    nextRakat();
                }
                // Cas 3 : Autre Rakat
                else {
                    say("Allahou Akbar");
                    nextRakat();
                }
            } else {
                // Premier Sujud de n'importe quelle rakaat
                say("Allahou Akbar");
                updateUI();
            }
        }

        function nextRakat() {
            setTimeout(() => {
                state.currR++;
                state.currS = 0;
                document.getElementById('msg-alert').innerText = "";
                updateUI();
            }, 2000);
        }

        function updateUI() {
            document.getElementById('curr-r').innerText = state.currR;
            document.getElementById('sujud-icons').innerText = (state.currS === 1) ? "🟢 ⚪" : "⚪ ⚪";
        }

        // --- INITIALISATION ---
        async function fetchTimes(lat, lon) {
            const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`);
            const data = await res.json();
            const t = data.data.timings;
            const table = document.getElementById('prayer-list');
            table.innerHTML = prayers.map(p => `
                <tr class="prayer-row" onclick="startPrayer('${p.id}', ${p.r})">
                    <td>${p.id}</td><td>${p.r} Rakat</td><td>${t[p.id]}</td>
                </tr>
            `).join('');
        }

        window.onload = () => {
            initLocation();
            // Débloquer l'audio
            document.body.addEventListener('click', () => { say(""); }, {once: true});
        };
    </script>
</body>
</html>
