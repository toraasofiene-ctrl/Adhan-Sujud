<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Khanzab PWA</title>
    <style>
        :root {
            --emerald: #097969;
            --gold: #D4AF37;
            --black: #000000;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; 
            background: var(--emerald); color: white;
        }

        /* --- ACCUEIL --- */
        #home-screen {
            display: flex; flex-direction: column; height: 100%; padding: 10px;
            background: radial-gradient(circle, var(--emerald) 0%, #043932 100%);
            border: 8px solid var(--gold); overflow-y: auto;
        }

        .lang-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }
        .lang-btn.active { background: var(--gold); color: black; }

        .header h1 { text-align: center; color: var(--gold); margin: 5px 0; font-size: 2rem; letter-spacing: 2px; }

        /* TAPIS DE PRIÈRE (QIBLA INVERSÉE) */
        .qibla-area { position: relative; width: 120px; height: 140px; margin: 0 auto 10px; }
        #prayer-rug { width: 100%; height: 100%; transition: transform 0.3s ease-out; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        .prayer-table { width: 100%; border-collapse: collapse; direction: rtl; }
        .prayer-row { background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--gold); height: 55px; cursor: pointer; }
        .prayer-row td { text-align: center; font-size: 1.2rem; font-weight: bold; padding: 0 10px; }
        .p-time { color: var(--gold); font-size: 0.9rem !important; }

        /* --- ÉCRAN IQAMA (STYLE PORTE VERTE) --- */
        #iqama-screen {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: var(--emerald); border: 15px solid var(--gold);
            border-image: linear-gradient(to right, #bf953f, #fcf6ba, #b38728) 1;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .arch-decoration { position: absolute; top: 0; width: 70%; height: 150px; border: 5px solid var(--gold); border-bottom: none; border-radius: 50% 50% 0 0; opacity: 0.3; }
        .column { position: absolute; bottom: 0; width: 30px; height: 70%; background: linear-gradient(to right, #b38728, #fcf6ba, #b38728); }
        .col-l { left: 15px; } .col-r { right: 15px; }

        /* --- ÉCRAN DE PRIÈRE (LANDSCAPE NOIR) --- */
        #prayer-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--black); z-index: 3000; flex-direction: row; align-items: center;
        }

        #ui-layer {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; pointer-events: none;
        }
        .rakat-display { font-size: 14rem; font-weight: bold; color: var(--gold); line-height: 1; }
        #liturgy-label { font-size: 2.5rem; color: var(--white); text-align: center; margin-top: 10px; font-weight: bold; }

        /* ZONE TACTILE 100% */
        #touch-layer { position: absolute; inset: 0; z-index: 5; cursor: pointer; }

        .btn-back { position: absolute; top: 15px; left: 15px; z-index: 100; background: #222; border: 1px solid var(--gold); color: white; padding: 10px 15px; }
    </style>
</head>
<body>

    <!-- ACCUEIL -->
    <div id="home-screen">
        <div class="lang-bar" id="lang-selector">
            <button class="lang-btn active" onclick="setLang('ar')">العربية</button>
            <button class="lang-btn" onclick="setLang('fr')">Français</button>
            <button class="lang-btn" onclick="setLang('en')">English</button>
            <button class="lang-btn" onclick="setLang('tr')">Türkçe</button>
            <button class="lang-btn" onclick="setLang('ur')">اردو</button>
        </div>

        <div class="header"><h1 id="txt-title">KHANZAB</h1></div>
        
        <div class="qibla-area">
            <svg id="prayer-rug" viewBox="0 0 100 140">
                <rect x="10" y="10" width="80" height="120" rx="5" fill="#7b1113" stroke="#D4AF37" stroke-width="2"/>
                <path d="M50 15 L75 40 L75 110 L25 110 L25 40 Z" fill="#5a0d0e" stroke="#D4AF37" stroke-width="1"/>
                <!-- Mihrab (Pointe Jaune vers la Mecque) -->
                <path d="M50 20 L65 38 L35 38 Z" fill="#D4AF37"/>
                <text x="50" y="80" text-anchor="middle" fill="#D4AF37" font-size="8" font-weight="bold">QIBLA</text>
            </svg>
        </div>

        <table class="prayer-table" id="p-list"></table>
    </div>

    <!-- IQAMA -->
    <div id="iqama-screen">
        <div class="arch-decoration"></div>
        <div class="column col-l"></div>
        <div class="column col-r"></div>
        <h1 id="iqama-title" style="color: var(--gold); font-size: 3.5rem;">إقامة الصلاة</h1>
        <button onclick="skipIqama()" style="margin-top:40px; background:var(--gold); border:none; padding:15px 40px; font-weight:bold; border-radius:50px; font-size: 1.2rem;">Commencer</button>
    </div>

    <!-- PRIÈRE -->
    <div id="prayer-screen">
        <button class="btn-back" id="btn-exit" onclick="stopPrayer()">Retour</button>
        <div id="ui-layer">
            <div id="p-name-active" style="font-size: 1.5rem; color: var(--gold); font-weight: bold;">FAJR</div>
            <div class="rakat-display"><span id="curr-r">1</span>/<span id="total-r">2</span></div>
            <div id="sujud-dots" style="font-size: 3.5rem; margin-top:10px;">⚪ ⚪</div>
            <div id="liturgy-label"></div>
        </div>
        <div id="touch-layer"></div>
    </div>

    <script>
        const i18n = {
            ar: { title: "خنزب", names: ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"], iqama: "إقامة الصلاة", back: "رجوع", rakat: "ركعات" },
            fr: { title: "KHANZAB", names: ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"], iqama: "Iqama", back: "Retour", rakat: "Rakats" },
            en: { title: "KHANZAB", names: ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"], iqama: "Iqama", back: "Back", rakat: "Rakats" },
            tr: { title: "KHANZAB", names: ["Sabah", "Öğle", "İkindi", "Akşam", "Yatsı"], iqama: "Kamet", back: "Geri", rakat: "Rekat" },
            ur: { title: "خنزب", names: ["فجر", "ظہر", "عصر", "مغرب", "عشاء"], iqama: "اقامت", back: "واپس", rakat: "رکعت" }
        };

        let currentLang = 'ar';
        let prayerTimes = {};
        let state = { isPraying: false, currR: 1, totalR: 0, currS: 0, lastTouch: 0, qiblaAngle: 0, timer: null };

        // --- AUDIO HUMAIN MASCULIN ---
        function speak(text, slow = false) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            const voices = window.speechSynthesis.getVoices();
            const male = voices.find(v => v.lang.includes('ar') && (v.name.includes('Male') || v.name.includes('Masculine')));
            if (male) msg.voice = male;
            msg.pitch = 0.7; // Profond
            msg.rate = slow ? 0.85 : 0.8;
            window.speechSynthesis.speak(msg);
        }

        // --- IQAMA ---
        function startIqama(name, r) {
            state.totalR = r; state.currentName = name;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('iqama-screen').style.display = 'flex';
            
            const iqamaStr = "الله أكبر ، الله أكبر. أشهد أن لا إله إلا الله. أشهد أن محمدا رسول الله. حي على الصلاة ، حي على الفلاح. قد قامت الصلاة ، قد قامت الصلاة. الله أكبر ، الله أكبر. لا إله إلا الله";
            speak(iqamaStr, true);
            state.timer = setTimeout(() => launchPrayer(), 14500);
        }

        function skipIqama() { clearTimeout(state.timer); launchPrayer(); }

        function launchPrayer() {
            document.getElementById('iqama-screen').style.display = 'none';
            document.getElementById('prayer-screen').style.display = 'flex';
            state.isPraying = true; state.currR = 1; state.currS = 0;
            document.getElementById('p-name-active').innerText = state.currentName;
            document.getElementById('total-r').innerText = state.totalR;
            updateUI();

            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        }

        // --- LOGIQUE TACTILE 2 SUJUD = 1 RAKAT ---
        document.getElementById('touch-layer').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - state.lastTouch < 1200) return;
            state.lastTouch = now;

            state.currS++;

            if (state.currS === 1) {
                speak("استغفر الله");
                document.getElementById('liturgy-label').innerText = "إستغفار";
                document.getElementById('sujud-dots').innerHTML = "🟢 ⚪";
            } else if (state.currS === 2) {
                document.getElementById('sujud-dots').innerHTML = "🟢 🟢";
                const isLast = (state.currR === state.totalR);
                const isEven = (state.currR % 2 === 0);

                if (isLast) {
                    speak("تشهد و الصلاة الإبراهيمية");
                    document.getElementById('liturgy-label').innerText = "تشهد و الصلاة الإبراهيمية";
                    setTimeout(() => stopPrayer(), 6000);
                } else {
                    if (isEven) {
                        speak("تشهد");
                        document.getElementById('liturgy-label').innerText = "تشهد";
                    } else {
                        speak("الله أكبر");
                        document.getElementById('liturgy-label').innerText = "الله أكبر";
                    }
                    setTimeout(() => { state.currR++; state.currS = 0; updateUI(); }, 2500);
                }
            }
        });

        function updateUI() {
            document.getElementById('curr-r').innerText = state.currR;
            document.getElementById('sujud-dots').innerHTML = "⚪ ⚪";
            document.getElementById('liturgy-label').innerText = "";
        }

        function stopPrayer() {
            state.isPraying = false; window.speechSynthesis.cancel();
            document.getElementById('prayer-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        }

        // --- API & UI ---
        async function fetchTimes() {
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Tunis&country=Tunisia&method=5');
                const data = await res.json();
                prayerTimes = data.data.timings;
                updateUIStrings();
            } catch (e) { updateUIStrings(); }
        }

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateUIStrings();
        }

        function updateUIStrings() {
            const t = i18n[currentLang];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('btn-exit').innerText = t.back;
            document.getElementById('iqama-title').innerText = t.iqama;
            
            const pMap = [{id:'Fajr',r:2},{id:'Dhuhr',r:4},{id:'Asr',r:4},{id:'Maghrib',r:3},{id:'Isha',r:4}];
            const list = document.getElementById('p-list');
            list.innerHTML = pMap.map((p, i) => {
                const time = prayerTimes[p.id] || "--:--";
                return `<tr class="prayer-row" onclick="startIqama('${t.names[i]}', ${p.r})">
                    <td class="p-time">${time}</td><td>${p.r} ${t.rakat}</td><td>${t.names[i]}</td>
                </tr>`;
            }).join('');
        }

        function initQibla() {
            navigator.geolocation.getCurrentPosition(pos => {
                const latK = 21.4225, lonK = 39.8262;
                const phi = pos.coords.latitude * Math.PI / 180;
                const lambda = pos.coords.longitude * Math.PI / 180;
                const phiK = latK * Math.PI / 180;
                const lambdaK = lonK * Math.PI / 180;
                const y = Math.sin(lambdaK - lambda);
                const x = Math.cos(phi) * Math.tan(phiK) - Math.sin(phi) * Math.cos(lambdaK - lambda);
                state.qiblaAngle = Math.atan2(y, x) * 180 / Math.PI;
            });

            window.addEventListener('deviceorientationabsolute', e => {
                let heading = e.alpha || e.webkitCompassHeading;
                if (heading) {
                    const rotation = state.qiblaAngle - heading;
                    document.getElementById('prayer-rug').style.transform = `rotate(${-rotation}deg)`;
                }
            }, true);
        }

        window.onload = () => { fetchTimes(); initQibla(); document.body.addEventListener('click', () => { speak(""); }, {once: true}); };
    </script>
</body>
</html>
