<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Khanzab PWA</title>
    <style>
        :root {
            --emerald: #097969;
            --gold: #D4AF37;
            --black: #000000;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; 
            background: var(--emerald); color: white;
        }

        /* --- ACCUEIL --- */
        #home-screen {
            display: flex; flex-direction: column; height: 100%; padding: 10px;
            background: radial-gradient(circle, var(--emerald) 0%, #043932 100%);
            border: 8px solid var(--gold); overflow-y: auto;
            position: relative;
        }

        .sphere-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            z-index: 100;
        }

        .striated-sphere {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fcf6ba, #bf953f, #aa771c);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset -2px -2px 6px rgba(0,0,0,0.5);
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 3px, transparent 4px);
            cursor: pointer;
            transition: transform 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .striated-sphere:active { transform: scale(0.9); }

        #lang-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--gold);
            border-radius: 8px;
            padding: 10px;
            width: 120px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .lang-option {
            padding: 10px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            text-align: right;
            cursor: pointer;
        }

        .lang-option:last-child { border-bottom: none; }
        .lang-option:active { color: var(--gold); }

        .header h1 { text-align: center; color: var(--gold); margin: 5px 0; font-size: 2rem; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* TAPIS DE PRIÈRE (QIBLA) */
        .qibla-area {
            position: relative; width: 140px; height: 160px; margin: 0 auto 10px;
        }
        #prayer-rug {
            width: 100%; height: 100%; transition: transform 0.4s cubic-bezier(0.1, 0.5, 0.1, 1);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }
