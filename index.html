<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Khanzab PWA</title>
    <style>
        :root {
            --emerald: #097969;
            --gold: #d4af37;
            --white: #ffffff;
            --black: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: var(--emerald); color: white; }

        /* --- ACCUEIL (Vert Émeraude) --- */
        #home-screen {
            display: flex; flex-direction: column; height: 100%; 
            background: radial-gradient(circle, var(--emerald) 0%, #043932 100%);
            padding: 10px; text-align: center; overflow-y: auto;
        }

        .lang-bar { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: white; padding: 5px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
        .lang-btn.active { background: var(--gold); color: black; }

        .qibla-container { position: relative; width: 130px; height: 150px; margin: 10px auto; }
        #prayer-rug { width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.1, 0.5, 0.1, 1); }

        .prayer-table { width: 100%; border-collapse: collapse; margin-top: 5px; direction: rtl; }
        .prayer-row { background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--gold); height: 55px; cursor: pointer; }
        .prayer-row td { font-size: 1.2rem; font-weight: bold; padding: 0 10px; }
        .p-time { color: var(--gold); font-size: 0.9rem !important; }

        /* --- IQAMA (Inspiré Porte Verte) --- */
        #iqama-screen {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: var(--emerald);
            border: 12px solid var(--gold);
            border-image: linear-gradient(to right, #bf953f, #fcf6ba, #b38728) 1;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .arch-decoration {
            position: absolute; top: 0; width: 70%; height: 150px;
            border: 5px solid var(--gold); border-bottom: none; border-radius: 50% 50% 0 0; opacity: 0.3;
        }
        .column { position: absolute; bottom: 0; width: 30px; height: 70%; background: linear-gradient(to right, #b38728, #fcf6ba, #b38728); }
        .col-l { left: 15px; } .col-r { right: 15px; }

        /* --- PAGE DE SUIVI (PAYSAGE HORIZONTAL) --- */
        #prayer-screen {
            display: none; position: fixed; inset: 0; background: var(--black); z-index: 3000;
        }
        
        #ui-layer {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1; pointer-events: none;
        }
        .rakat-num { font-size: 14rem; font-weight: bold; color: var(--gold); line-height: 0.8; }
        #liturgy-label { font-size: 2.5rem; color: white; margin-top: 20px; font-weight: bold; text-align: center; }

        /* Zone tactile totale */
        #touch-layer { position: absolute; inset: 0; z-index: 10; cursor: pointer; }
        
        .btn-exit { position: absolute; top: 15px; left: 15px; z-index: 100; background: #333; color: white; border: 1px solid var(--gold); padding: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <!-- ACCUEIL -->
    <div id="home-screen">
        <div class="lang-bar" id="lang-selector">
            <button class="lang-btn active" onclick="setLang('ar')">العربية</button>
            <button class="lang-btn" onclick="setLang('fr')">FR</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
            <button class="lang-btn" onclick="setLang('tr')">TR</button>
        </div>

        <h1 id="txt-title" style="color: var(--gold); margin: 5px 0;">KHANZAB</h1>
        
        <div class="qibla-container">
            <svg id="prayer-rug" viewBox="0 0 100 140">
                <rect x="10" y="10" width="80" height="120" rx="5" fill="#064e3b" stroke="var(--gold)" stroke-width="3"/>
                <path d="M50 15 L75 40 L75 115 L25 115 L25 40 Z" fill="#043932" stroke="var(--gold)" stroke-width="1"/>
                <path d="M50 20 L65 38 L35 38 Z" fill="var(--gold)"/> <!-- La pointe dorée pointant vers la Qibla -->
                <text x="50" y="80" text-anchor="middle" fill="var(--gold)" font-size="8" font-weight="bold">QIBLA</text>
            </svg>
        </div>

        <table class="prayer-table" id="p-list">
            <!-- Rempli par JavaScript -->
        </table>
    </div>

    <!-- IQAMA (Page intermédiaire) -->
    <div id="iqama-screen">
        <div class="arch-decoration"></div>
        <div class="column col-l"></div>
        <div class="column col-r"></div>
        <h1 id="iqama-title" style="color: var(--gold); font-size: 3.5rem;">إقامة الصلاة</h1>
        <button onclick="skipIqama()" style="margin-top:40px; background:var(--gold); border:none; padding:15px 40px; font-weight:bold; border-radius:50px; font-size: 1.2rem;">Commencer</button>
    </div>

    <!-- SUIVI (Paysage Horizontal) -->
    <div id="prayer-screen">
        <button class="btn-exit" id="btn-back" onclick="stopPrayer()">RETOUR</button>
        <div id="ui-layer">
            <div id="p-name-active" style="font-size: 1.5rem; color: var(--gold); letter-spacing: 2px; font-weight: bold;">FAJR</div>
            <div class="rakat-num"><span id="curr-r">1</span>/<span id="total-r">2</span></div>
            <div id="liturgy-label"></div>
            <div id="sujud-dots" style="font-size: 3.5rem; margin-top:10px;">⚪ ⚪</div>
        </div>
        <div id="touch-layer"></div>
    </div>

    <script>
        const i18n = {
            ar: { title: "خنزب", iqama: "إقامة الصلاة", back: "رجوع", rakat: "ركعات", names: ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"] },
            fr: { title: "KHANZAB", iqama: "Iqama", back: "Retour", rakat: "Rakats", names: ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"] },
            en: { title: "KHANZAB", iqama: "Iqama", back: "Back", rakat: "Rakats", names: ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"] },
            tr: { title: "KHANZAB", iqama: "Kamet", back: "Geri", rakat: "Rekat", names: ["Sabah", "Öğle", "İkindi", "Akşam", "Yatsı"] }
        };

        let currentLang = 'ar';
        let prayerTimes = {};
        let state = { isPraying: false, currR: 1, totalR: 0, currS: 0, lastT: 0, qibla: 0, timer: null };

        // --- VOIX HUMAINE MASCULINE ---
        function speak(text, slow = false) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            const voices = window.speechSynthesis.getVoices();
            const male = voices.find(v => v.lang.includes('ar') && (v.name.includes('Male') || v.name.includes('Masculine')));
            if (male) msg.voice = male;
            msg.pitch = 0.7; 
            msg.rate = slow ? 0.85 : 0.8;
            window.speechSynthesis.speak(msg);
        }

        // --- IQAMA & PRAYER ---
        function startIqama(name, r) {
            state.totalR = r;
            state.currentName = name;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('iqama-screen').style.display = 'flex';
            
            const iqamaText = "الله أكبر ، الله أكبر. أشهد أن لا إله إلا الله. أشهد أن محمدا رسول الله. حي على الصلاة ، حي على الفلاح. قد قامت الصلاة ، قد قامت الصلاة. الله أكبر ، الله أكبر. لا إله إلا الله";
            speak(iqamaText, true);
            state.timer = setTimeout(() => launchPrayer(), 14000);
        }

        function skipIqama() {
            clearTimeout(state.timer);
            launchPrayer();
        }

        function launchPrayer() {
            document.getElementById('iqama-screen').style.display = 'none';
            document.getElementById('prayer-screen').style.display = 'flex';
            state.isPraying = true;
            state.currR = 1; state.currS = 0;
            document.getElementById('p-name-active').innerText = state.currentName;
            document.getElementById('total-r').innerText = state.totalR;
            updateUI();
            
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        }

        // --- TACTILE LOGIC ---
        document.getElementById('touch-layer').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - state.lastT < 1200) return;
            state.lastT = now;
            
            state.currS++;
            if (state.currS === 1) {
                speak("استغفر الله");
                document.getElementById('liturgy-label').innerText = "إستغفار";
                document.getElementById('sujud-dots').innerHTML = "🟢 ⚪";
            } else {
                document.getElementById('sujud-dots').innerHTML = "🟢 🟢";
                const isFinal = (state.currR === state.totalR);
                const isEven = (state.currR % 2 === 0);

                if (isFinal) {
                    speak("تشهد و الصلاة الإبراهيمية");
                    document.getElementById('liturgy-label').innerText = "تشهد و الصلاة الإبراهيمية";
                    setTimeout(() => stopPrayer(), 6000);
                } else if (isEven) {
                    speak("تشهد");
                    document.getElementById('liturgy-label').innerText = "تشهد";
                    nextRakat();
                } else {
                    speak("الله أكبر");
                    document.getElementById('liturgy-label').innerText = "الله أكبر";
                    nextRakat();
                }
            }
        });

        function nextRakat() {
            setTimeout(() => {
                state.currR++; state.currS = 0;
                updateUI();
            }, 2500);
        }

        function updateUI() {
            document.getElementById('curr-r').innerText = state.currR;
            document.getElementById('sujud-dots').innerHTML = "⚪ ⚪";
            document.getElementById('liturgy-label').innerText = "";
        }

        function stopPrayer() {
            state.isPraying = false;
            window.speechSynthesis.cancel();
            document.getElementById('prayer-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        }

        // --- API & UI STRINGS ---
        async function fetchPrayerTimes() {
            try {
                // Par défaut : Tunis, Tunisie (Méthode 5)
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Tunis&country=Tunisia&method=5');
                const data = await res.json();
                prayerTimes = data.data.timings;
                updateStrings();
            } catch (e) {
                console.error("Erreur API", e);
                updateStrings();
            }
        }

        function setLang(l) { 
            currentLang = l; 
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateStrings(); 
        }

        function updateStrings() {
            const t = i18n[currentLang];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('iqama-title').innerText = t.iqama;
            document.getElementById('btn-back').innerText = t.back;
            
            const pMapping = [
                { id: 'Fajr', r: 2, ar: "الفجر" },
                { id: 'Dhuhr', r: 4, ar: "الظهر" },
                { id: 'Asr', r: 4, ar: "العصر" },
                { id: 'Maghrib', r: 3, ar: "المغرب" },
                { id: 'Isha', r: 4, ar: "العشاء" }
            ];

            const list = document.getElementById('p-list');
            list.innerHTML = pMapping.map((p, index) => {
                const name = t.names[index];
                const time = prayerTimes[p.id] || "--:--";
                return `
                <tr class="prayer-row" onclick="startIqama('${name}', ${p.r})">
                    <td class="p-time">${time}</td>
                    <td>${p.r} ${t.rakat}</td>
                    <td>${name}</td>
                </tr>`;
            }).join('');
        }

        function initQibla() {
            navigator.geolocation.getCurrentPosition(pos => {
                const latK = 21.4225, lonK = 39.8262;
                const phi = pos.coords.latitude * Math.PI / 180;
                const lambda = pos.coords.longitude * Math.PI / 180;
                const phiK = latK * Math.PI / 180;
                const lambdaK = lonK * Math.PI / 180;
                const y = Math.sin(lambdaK - lambda);
                const x = Math.cos(phi) * Math.tan(phiK) - Math.sin(phi) * Math.cos(lambdaK - lambda);
                state.qibla = Math.atan2(y, x) * 180 / Math.PI;
            });

            window.addEventListener('deviceorientationabsolute', e => {
                let heading = e.alpha || e.webkitCompassHeading;
                if (heading !== null) {
                    const rotation = state.qibla - heading;
                    document.getElementById('prayer-rug').style.transform = `rotate(${-rotation}deg)`;
                }
            }, true);
        }

        window.onload = () => {
            fetchPrayerTimes();
            initQibla();
            document.body.addEventListener('click', () => { speak(""); }, {once: true});
        };
    </script>
</body>
</html>
