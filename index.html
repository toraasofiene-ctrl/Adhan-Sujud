<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Khanzab PWA</title>
    <style>
        :root {
            --emerald: #097969;
            --gold: #D4AF37;
            --black: #000000;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; 
            background: var(--emerald); color: white;
        }

        /* --- ACCUEIL --- */
        #home-screen {
            display: flex; flex-direction: column; height: 100%; padding: 10px;
            background: radial-gradient(circle, var(--emerald) 0%, #043932 100%);
            border: 8px solid var(--gold); overflow-y: auto;
            position: relative;
        }

        /* Sphère Striée */
        .sphere-container {
            position: absolute; top: 20px; right: 20px;
            display: flex; align-items: center; z-index: 100;
        }
        .striated-sphere {
            width: 45px; height: 45px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fcf6ba, #bf953f, #aa771c);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset -2px -2px 6px rgba(0,0,0,0.5);
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 3px, transparent 4px);
            cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
        }

        #lang-dropdown {
            display: none; position: absolute; top: 50px; right: 0;
            background: rgba(0, 0, 0, 0.95); border: 1px solid var(--gold);
            border-radius: 8px; padding: 10px; width: 130px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .lang-option { padding: 10px; font-size: 0.9rem; border-bottom: 1px solid rgba(212, 175, 55, 0.2); text-align: right; cursor: pointer; }

        .header h1 { text-align: center; color: var(--gold); margin: 5px 0; font-size: 2rem; letter-spacing: 2px; }

        /* TAPIS DE PRIÈRE (QIBLA) */
        .qibla-area { position: relative; width: 130px; height: 150px; margin: 0 auto 10px; opacity: 0.2; transition: opacity 1s; }
        #prayer-rug { width: 100%; height: 100%; transition: transform 0.5s ease-out; }

        .prayer-table { width: 100%; border-collapse: collapse; direction: rtl; margin-top: 10px; }
        .prayer-row { background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--gold); height: 55px; }
        .prayer-row td { text-align: center; font-size: 1.1rem; font-weight: bold; }
        .p-time { color: var(--gold); font-size: 0.9rem !important; }
        .vol-btn { font-size: 1.4rem; cursor: pointer; }

        /* --- IQAMA --- */
        #iqama-screen {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: var(--emerald); border: 15px solid var(--gold);
            flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- PRAYER PAGE (Landscape) --- */
        #prayer-screen { display: none; position: fixed; inset: 0; background: var(--black); z-index: 3000; }
        #ui-layer { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; pointer-events: none; }
        .rakat-display { font-size: 15rem; font-weight: bold; color: var(--gold); line-height: 1; }
        #liturgy-label { font-size: 2.5rem; color: var(--white); text-align: center; font-weight: bold; }
        #touch-layer { position: absolute; inset: 0; z-index: 5; cursor: pointer; }
        .btn-back { position: absolute; top: 15px; left: 15px; z-index: 10; background: #222; border: 1px solid var(--gold); color: white; padding: 10px 15px; border-radius: 5px; }

        /* --- ADHAN ALERT --- */
        #adhan-screen {
            display: none; position: fixed; inset: 0; z-index: 4000;
            background: #000; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="sphere-container">
            <div class="striated-sphere" onclick="toggleLang()"></div>
            <div id="lang-dropdown">
                <div class="lang-option" onclick="setLang('ar')">العربية</div>
                <div class="lang-option" onclick="setLang('fr')">Français</div>
                <div class="lang-option" onclick="setLang('tr')">Türkçe</div>
                <div class="lang-option" onclick="setLang('ur')">اردو</div>
                <div class="lang-option" onclick="setLang('id')">Bahasa</div>
                <div class="lang-option" onclick="setLang('bn')">বাংলা</div>
            </div>
        </div>

        <div class="header"><h1>KHANZAB</h1></div>
        
        <div id="qibla-box" class="qibla-area">
            <svg id="prayer-rug" viewBox="0 0 100 140">
                <rect x="10" y="10" width="80" height="120" rx="5" fill="#7b1113" stroke="#D4AF37" stroke-width="2"/>
                <path d="M50 15 L75 40 L75 115 L25 115 L25 40 Z" fill="#5a0d0e" stroke="#D4AF37" stroke-width="1"/>
                <path d="M50 20 L65 38 L35 38 Z" fill="#D4AF37"/>
            </svg>
        </div>

        <table class="prayer-table" id="p-list"></table>
    </div>

    <!-- IQAMA -->
    <div id="iqama-screen">
        <h1 id="iqama-title" style="color: var(--gold); font-size: 3.5rem;">إقامة الصلاة</h1>
        <button onclick="skipIqama()" style="margin-top:40px; background:var(--gold); border:none; padding:15px 40px; font-weight:bold; border-radius:50px; font-size: 1.2rem; cursor: pointer;">Commencer</button>
    </div>

    <!-- ADHAN SCREEN -->
    <div id="adhan-screen" onclick="stopAdhanAlert()">
        <div style="font-size: 5rem;">🕌</div>
        <h1 id="adhan-display-title" style="color: var(--gold); font-size: 3rem;">أذان</h1>
    </div>

    <!-- PRAYER PAGE -->
    <div id="prayer-screen">
        <button class="btn-back" onclick="stopPrayer()">RETOUR</button>
        <div id="ui-layer">
            <div id="p-name-active" style="font-size: 2rem; color: var(--gold);">FAJR</div>
            <div class="rakat-display"><span id="curr-r">1</span>/<span id="total-r">2</span></div>
            <div id="sujud-dots" style="font-size: 3.5rem; margin-top:10px;">⚪ ⚪</div>
            <div id="liturgy-label"></div>
        </div>
        <div id="touch-layer"></div>
    </div>

    <script>
        const i18n = {
            ar: { names: ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"], iqama: "إقامة الصلاة", rakat: "ركعات", isteghfar: "رَبِّ اغْفِرْ لِي", takbir: "اللهُ أَكْبَر", tachahoud: "التَّشَهُّدّ", final: "التَّشَهُّدُّ وَالصَّلَاةُ الإِبْرَاهِيمِيَّة" },
            fr: { names: ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"], iqama: "Iqama", rakat: "Rakats", isteghfar: "Rabbi ghfir li", takbir: "Allahu Akbar", tachahoud: "Tachahoud", final: "Tachahoud Final" }
        };

        let currentLang = 'ar';
        let prayerTimes = null;
        let state = { isPraying: false, currR: 1, totalR: 0, currS: 0, lastT: 0, qibla: 0, lastAdhan: "" };
        let adhanSettings = JSON.parse(localStorage.getItem('khanzab_vol')) || { Fajr: true, Dhuhr: true, Asr: true, Maghrib: true, Isha: true };

        const sounds = {
            iqama: new Audio('iqama.mp3'), isteghfar: new Audio('isteghfar.mp3'), takbir: new Audio('takbir.mp3'),
            tachahoud: new Audio('tachahoud.mp3'), tachahoudFinal: new Audio('tachahoud-final.mp3'), adhan: new Audio('adhan.mp3')
        };

        function playSound(key) {
            if (sounds[key]) {
                sounds[key].currentTime = 0;
                sounds[key].play().catch(() => {});
            }
        }

        // --- GESTION DES LANGUES & AFFICHAGE IMMEDIAT ---
        function toggleLang() {
            const d = document.getElementById('lang-dropdown');
            d.style.display = (d.style.display === 'block') ? 'none' : 'block';
        }

        function setLang(lang) {
            currentLang = (i18n[lang]) ? lang : 'ar';
            document.getElementById('lang-dropdown').style.display = 'none';
            renderTable();
        }

        function renderTable() {
            const t = i18n[currentLang] || i18n.ar;
            const pKeys = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            const rCount = [2, 4, 4, 3, 4];
            
            let html = "";
            pKeys.forEach((key, i) => {
                const time = prayerTimes ? prayerTimes[key] : "--:--";
                const isMuted = !adhanSettings[key];
                html += `
                    <tr class="prayer-row">
                        <td class="vol-btn" onclick="toggleVol('${key}', event)">${isMuted ? '🔇' : '🔊'}</td>
                        <td class="p-time">${time}</td>
                        <td onclick="startIqama('${t.names[i]}', ${rCount[i]})" style="cursor:pointer">${t.names[i]}</td>
                    </tr>`;
            });
            document.getElementById('p-list').innerHTML = html;
        }

        function toggleVol(k, e) {
            e.stopPropagation();
            adhanSettings[k] = !adhanSettings[k];
            localStorage.setItem('khanzab_vol', JSON.stringify(adhanSettings));
            renderTable();
        }

        // --- LOCALISATION & API ---
        async function initGeo() {
            // Rendu initial pour éviter une page vide
            renderTable();

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => fetchAPI(pos.coords.latitude, pos.coords.longitude),
                    () => fetchAPIByIP()
                );
            } else {
                fetchAPIByIP();
            }
        }

        async function fetchAPIByIP() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                fetchAPI(data.latitude || 36.8, data.longitude || 10.1); // Fallback Tunis
            } catch (e) {
                fetchAPI(36.8, 10.1); 
            }
        }

        async function fetchAPI(lat, lon) {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`);
                const data = await res.json();
                prayerTimes = data.data.timings;
                renderTable();
                initQibla(lat, lon);
            } catch (e) {
                renderTable();
            }
        }

        function initQibla(lat, lon) {
            const latK = 21.4225, lonK = 39.8262;
            const phi = lat * Math.PI / 180, lambda = lon * Math.PI / 180;
            const phiK = latK * Math.PI / 180, lambdaK = lonK * Math.PI / 180;
            const y = Math.sin(lambdaK - lambda);
            const x = Math.cos(phi) * Math.tan(phiK) - Math.sin(phi) * Math.cos(lambdaK - lambda);
            state.qibla = Math.atan2(y, x) * 180 / Math.PI;
            
            document.getElementById('qibla-box').style.opacity = "1";
            window.addEventListener('deviceorientationabsolute', e => {
                let h = e.alpha || e.webkitCompassHeading;
                if (h) document.getElementById('prayer-rug').style.transform = `rotate(${- (h - state.qibla) + 180}deg)`;
            }, true);
        }

        // --- PRAYER LOGIC (2 SUJUD = 1 RAKAT) ---
        function startIqama(name, r) {
            state.totalR = r;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('iqama-screen').style.display = 'flex';
            document.getElementById('p-name-active').innerText = name;
            playSound('iqama');
            sounds.iqama.onended = () => launch();
        }

        function skipIqama() { sounds.iqama.pause(); launch(); }

        function launch() {
            document.getElementById('iqama-screen').style.display = 'none';
            document.getElementById('prayer-screen').style.display = 'block';
            state.isPraying = true; state.currR = 1; state.currS = 0;
            document.getElementById('total-r').innerText = state.totalR;
            updateUI();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }

        document.getElementById('touch-layer').addEventListener('touchstart', e => {
            e.preventDefault();
            const now = Date.now();
            if (now - state.lastT < 1200) return;
            state.lastT = now;
            
            state.currS++;
            const t = i18n[currentLang] || i18n.ar;
            
            if (state.currS === 1) {
                playSound('isteghfar');
                document.getElementById('liturgy-label').innerText = t.isteghfar;
                document.getElementById('sujud-dots').innerHTML = "🟢 ⚪";
            } else if (state.currS === 2) {
                document.getElementById('sujud-dots').innerHTML = "🟢 🟢";
                const isFinal = (state.currR === state.totalR);
                if (isFinal) {
                    playSound('tachahoudFinal');
                    document.getElementById('liturgy-label').innerText = t.final;
                    setTimeout(() => stopPrayer(), 6000);
                } else {
                    const isEven = (state.currR % 2 === 0);
                    if (isEven) {
                        playSound('tachahoud');
                        document.getElementById('liturgy-label').innerText = t.tachahoud;
                    } else {
                        playSound('takbir');
                        document.getElementById('liturgy-label').innerText = t.takbir;
                    }
                    setTimeout(() => { state.currR++; state.currS = 0; updateUI(); }, 2500);
                }
            }
        });

        function updateUI() {
            document.getElementById('curr-r').innerText = state.currR;
            document.getElementById('sujud-dots').innerHTML = "⚪ ⚪";
            document.getElementById('liturgy-label').innerText = "";
        }

        function stopPrayer() {
            state.isPraying = false;
            Object.values(sounds).forEach(s => { s.pause(); s.currentTime = 0; });
            document.getElementById('prayer-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
        }

        function checkAdhan() {
            if (state.isPraying || !prayerTimes) return;
            const now = new Date();
            const cur = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].forEach(k => {
                if (prayerTimes[k] === cur && state.lastAdhan !== cur && adhanSettings[k]) {
                    state.lastAdhan = cur;
                    document.getElementById('adhan-screen').style.display = 'flex';
                    playSound('adhan');
                }
            });
        }

        function stopAdhanAlert() {
            sounds.adhan.pause();
            document.getElementById('adhan-screen').style.display = 'none';
        }

        window.onload = () => {
            initGeo();
            setInterval(checkAdhan, 30000);
            // Débloquer l'audio mobile
            document.body.addEventListener('click', () => { 
                Object.values(sounds).forEach(s => { s.play().then(()=>s.pause()).catch(()=>{}) });
            }, {once: true});
        };
    </script>
</body>
</html>
