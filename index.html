<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Khanzab - Compteur</title>
    <style>
        :root {
            --emerald: #097969;
            --gold: #D4AF37;
            --black: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; 
            background: var(--emerald); 
        }

        /* --- ACCUEIL --- */
        #home-screen {
            display: flex; flex-direction: column; height: 100%; padding: 10px; color: white;
            background: radial-gradient(circle, var(--emerald) 0%, #043932 100%);
            border: 8px solid var(--gold);
        }

        .header h1 { 
            text-align: center; color: var(--gold); margin: 10px 0; 
            font-size: 2.5rem; letter-spacing: 3px;
        }

        /* QIBLA SIMPLIFIÉE (Logo Kaaba) */
        .qibla-container {
            position: relative; width: 100px; height: 100px; margin: 0 auto 10px;
            display: flex; justify-content: center; align-items: center;
        }
        #kaaba-icon {
            width: 60px; height: 60px;
            transition: transform 0.2s ease-out;
            filter: drop-shadow(0 0 5px var(--gold));
        }

        .prayer-table { width: 100%; border-collapse: collapse; }
        .prayer-row { 
            background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--gold); 
            cursor: pointer; height: 60px;
        }
        .prayer-row td { text-align: center; font-size: 1.3rem; font-weight: bold; }
        .prayer-time { color: var(--gold); font-size: 1rem !important; opacity: 0.8; }

        /* --- ECRAN DE PRIERE (CALQUES SUPERPOSÉS) --- */
        #prayer-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--black); z-index: 1000;
        }

        /* Calque 1 : Affichage (Compteur) */
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1; pointer-events: none; /* Laisse passer le clic vers le calque tactile */
        }
        .rakat-display { font-size: 15rem; font-weight: bold; color: var(--gold); line-height: 1; }
        .info-display { font-size: 2rem; color: white; opacity: 0.6; }
        .sujud-dots { font-size: 3rem; margin-top: 20px; }

        /* Calque 2 : Zone Tactile (Transparent, au-dessus) */
        #touch-layer {
            position: absolute; width: 100%; height: 100%;
            z-index: 2; cursor: pointer;
            display: flex; justify-content: flex-end; align-items: center;
        }

        /* Repère visuel clignotant sur le côté droit */
        .touch-hint {
            width: 100px; height: 100%;
            background: linear-gradient(to left, rgba(212, 175, 55, 0.1), transparent);
            animation: blink 2s infinite;
        }

        @keyframes blink { 0% { opacity: 0.1; } 50% { opacity: 0.4; } 100% { opacity: 0.1; } }

        .btn-exit {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(255,255,255,0.1); border: 1px solid var(--gold);
            color: white; padding: 10px 20px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <!-- ACCUEIL -->
    <div id="home-screen">
        <div class="header"><h1>KHANZAB</h1></div>
        
        <div class="qibla-container">
            <!-- SVG simple de la Kaaba -->
            <svg id="kaaba-icon" viewBox="0 0 100 100">
                <rect x="20" y="20" width="60" height="60" fill="#222" />
                <rect x="20" y="35" width="60" height="10" fill="#D4AF37" />
                <path d="M45 45 L55 45 L55 55 L45 55 Z" fill="#D4AF37" />
            </svg>
        </div>

        <table class="prayer-table" id="p-list">
            <!-- Rempli par JavaScript -->
        </table>
    </div>

    <!-- PRIÈRE -->
    <div id="prayer-screen">
        <button class="btn-exit" onclick="stopPrayer()">Retour</button>
        
        <!-- CALQUE COMPTEUR -->
        <div id="ui-layer">
            <div class="info-display" id="p-name">FAJR</div>
            <div class="rakat-display"><span id="curr-r">1</span>/<span id="total-r">2</span></div>
            <div id="sujud-dots" class="sujud-dots">⚪ ⚪</div>
            <div id="liturgy-text" style="color:var(--gold); font-size: 1.5rem; margin-top:10px;"></div>
        </div>

        <!-- CALQUE TACTILE SUPERPOSÉ -->
        <div id="touch-layer">
            <div class="touch-hint"></div>
        </div>
    </div>

    <script>
        const P_DATA = [
            {id: 'Fajr', r: 2}, {id: 'Dhuhr', r: 4}, {id: 'Asr', r: 4}, {id: 'Maghrib', r: 3}, {id: 'Isha', r: 4}
        ];

        let state = {
            isPraying: false, currR: 1, totalR: 0, currS: 0,
            lastTouch: 0, qiblaAngle: 100
        };

        // --- SYNTHÈSE VOCALE (VOIX HOMME NATURELLE) ---
        function speak(text) {
            if (!window.speechSynthesis) return;
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            
            // Sélection d'une voix masculine
            const voices = window.speechSynthesis.getVoices();
            // On cherche une voix arabe (Saudi ou Egypt) souvent plus naturelle sur Android
            const maleVoice = voices.find(v => (v.lang.includes('ar') && (v.name.includes('Male') || v.name.includes('Masculine'))));
            
            if (maleVoice) msg.voice = maleVoice;
            msg.pitch = 0.75; // Plus grave pour un son d'homme naturel
            msg.rate = 0.85;  // Légèrement plus lent pour la solennité
            window.speechSynthesis.speak(msg);
        }

        // --- GESTION DES TOUCHE (LOGIQUE LITURGIQUE) ---
        function handleTouch() {
            const now = Date.now();
            if (now - state.lastTouch < 1000) return; // Sécurité 1s
            state.lastTouch = now;

            state.currS++;

            if (state.currS === 1) {
                // Premier Sujud de n'importe quelle rakaat
                speak("Allahu Akbar");
                document.getElementById('sujud-dots').innerHTML = "🟢 ⚪";
                document.getElementById('liturgy-text').innerText = "";
            } 
            else if (state.currS === 2) {
                // Deuxième Sujud de la rakaat
                document.getElementById('sujud-dots').innerHTML = "🟢 🟢";

                if (state.currR === state.totalR) {
                    // C'est la dernière Rakaat
                    speak("Allahu Akbar. Tachahoud. Salat Ibrahimia");
                    document.getElementById('liturgy-text').innerText = "TACHAHOUD + SALAT IBRAHIMIA";
                    setTimeout(() => { alert("Prière terminée"); stopPrayer(); }, 5000);
                } else {
                    // Rakaat normale (1, 2 ou 3 selon la prière)
                    speak("Allahu Akbar. Tachahoud");
                    document.getElementById('liturgy-text').innerText = "TACHAHOUD";
                    
                    // Passage automatique à la rakaat suivante après un délai
                    setTimeout(() => {
                        state.currR++;
                        state.currS = 0;
                        updateUI();
                    }, 2500);
                }
            }
        }

        // --- UI & NAVIGATION ---
        function startPrayer(id, r) {
            state.isPraying = true;
            state.currR = 1; state.totalR = r; state.currS = 0;
            
            document.getElementById('p-name').innerText = id.toUpperCase();
            document.getElementById('total-r').innerText = r;
            document.getElementById('prayer-screen').style.display = 'block';
            updateUI();

            // Force Landscape PWA
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        }

        function stopPrayer() {
            state.isPraying = false;
            document.getElementById('prayer-screen').style.display = 'none';
            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        }

        function updateUI() {
            document.getElementById('curr-r').innerText = state.currR;
            document.getElementById('sujud-dots').innerHTML = "⚪ ⚪";
            document.getElementById('liturgy-text').innerText = "";
        }

        // --- BOUSSOLE (QIBLA) ---
        function initQibla() {
            // Position de la Mecque par rapport à la Tunisie (environ 100-110 degrés Est)
            // On utilise la géolocalisation pour plus de précision si disponible
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                // Calcul simplifié de l'angle de la Qibla
                const latK = 21.4225, lonK = 39.8262;
                const y = Math.sin(lonK - lon);
                const x = Math.cos(lat) * Math.tan(latK) - Math.sin(lat) * Math.cos(lonK - lon);
                state.qiblaAngle = Math.atan2(y, x) * 180 / Math.PI;
            });

            window.addEventListener('deviceorientationabsolute', e => {
                let heading = e.alpha || e.webkitCompassHeading;
                if (heading) {
                    const rotation = state.qiblaAngle - heading;
                    document.getElementById('kaaba-icon').style.transform = `rotate(${rotation}deg)`;
                }
            }, true);
        }

        // --- INITIALISATION ---
        window.onload = () => {
            initQibla();
            
            // Chargement de la liste des prières
            const list = document.getElementById('p-list');
            list.innerHTML = P_DATA.map(p => `
                <tr class="prayer-row" onclick="startPrayer('${p.id}', ${p.r})">
                    <td>${p.id}</td>
                    <td>${p.r} Rakat</td>
                </tr>
            `).join('');

            // Ecouteur sur le calque tactile
            document.getElementById('touch-layer').addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleTouch();
            });

            // Débloquer l'audio Chrome
            document.body.addEventListener('click', () => { 
                window.speechSynthesis.getVoices(); 
                speak(""); 
            }, {once: true});
        };
    </script>
</body>
</html>
