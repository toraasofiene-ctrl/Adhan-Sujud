<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Khanzab PWA</title>
    <style>
        :root {
            --emerald: #097969;
            --gold: #D4AF37;
            --black: #000000;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; 
            background: var(--emerald); color: white;
        }

        /* --- ACCUEIL --- */
        #home-screen {
            display: flex; flex-direction: column; height: 100%; padding: 10px;
            background: radial-gradient(circle, var(--emerald) 0%, #043932 100%);
            border: 8px solid var(--gold); overflow-y: auto;
            position: relative;
        }

        .sphere-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            z-index: 100;
        }

        .striated-sphere {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fcf6ba, #bf953f, #aa771c);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset -2px -2px 6px rgba(0,0,0,0.5);
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 3px, transparent 4px);
            cursor: pointer;
            transition: transform 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .striated-sphere:active { transform: scale(0.9); }

        #lang-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--gold);
            border-radius: 8px;
            padding: 10px;
            width: 120px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .lang-option {
            padding: 10px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            text-align: right;
            cursor: pointer;
        }

        .lang-option:last-child { border-bottom: none; }
        .lang-option:active { color: var(--gold); }

        .header h1 { text-align: center; color: var(--gold); margin: 5px 0; font-size: 2rem; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* TAPIS DE PRIÈRE (QIBLA) */
        .qibla-area {
            position: relative; width: 140px; height: 160px; margin: 0 auto 10px;
        }
        #prayer-rug {
            width: 100%; height: 100%; transition: transform 0.4s cubic-bezier(0.1, 0.5, 0.1, 1);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .prayer-table { width: 100%; border-collapse: collapse; direction: rtl; margin-top: 10px; }
        .prayer-row { 
            background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--gold); 
            height: 55px;
        }
        .prayer-row td { text-align: center; font-size: 1.2rem; font-weight: bold; padding: 0 10px; }
        .p-time { color: var(--gold); font-size: 0.9rem !important; }
        .vol-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; padding: 5px; }
        .clickable-zone { cursor: pointer; }

        /* --- IQAMA SCREEN --- */
        #iqama-screen {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: var(--emerald); border: 15px solid var(--gold);
            border-image: linear-gradient(to right, #bf953f, #fcf6ba, #b38728) 1;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .arch-decoration { position: absolute; top: 0; width: 70%; height: 150px; border: 5px solid var(--gold); border-bottom: none; border-radius: 50% 50% 0 0; opacity: 0.3; }
        .column { position: absolute; bottom: 0; width: 30px; height: 70%; background: linear-gradient(to right, #b38728, #fcf6ba, #b38728); }
        .col-l { left: 15px; } .col-r { right: 15px; }

        /* --- ÉCRAN ALERTE ADHAN --- */
        #adhan-screen {
            display: none; position: fixed; inset: 0; z-index: 4000;
            background: radial-gradient(circle, #043932 0%, #000000 100%);
            flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer;
        }
        .adhan-pulse {
            font-size: 5rem; animation: pulse 2s infinite; margin-bottom: 20px;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        /* --- ÉCRAN DE PRIÈRE --- */
        #prayer-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--black); z-index: 3000;
        }

        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1; pointer-events: none;
        }
        .rakat-display { font-size: 14rem; font-weight: bold; color: var(--gold); line-height: 1; }
        #liturgy-label { font-size: 2.5rem; color: var(--white); text-align: center; margin-top: 10px; font-weight: bold; }

        #touch-layer { position: absolute; width: 100%; height: 100%; z-index: 5; cursor: pointer; }
        .btn-back { position: absolute; top: 15px; left: 15px; z-index: 10; background: #222; border: 1px solid var(--gold); color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="sphere-container">
            <div class="striated-sphere" onclick="toggleLang()"></div>
            <div id="lang-dropdown">
                <div class="lang-option" onclick="setLang('ar')">العربية</div>
                <div class="lang-option" onclick="setLang('fr')">Français</div>
                <div class="lang-option" onclick="setLang('tr')">Türkçe</div>
                <div class="lang-option" onclick="setLang('ur')">اردو</div>
                <div class="lang-option" onclick="setLang('id')">Bahasa</div>
                <div class="lang-option" onclick="setLang('bn')">বাংলা</div>
            </div>
        </div>

        <div class="header"><h1 id="txt-title">KHANZAB</h1></div>
        
        <div class="qibla-area">
            <svg id="prayer-rug" viewBox="0 0 100 140">
                <rect x="10" y="10" width="80" height="120" rx="5" fill="#7b1113" stroke="#D4AF37" stroke-width="2"/>
                <path d="M50 15 L75 40 L75 115 L25 115 L25 40 Z" fill="#5a0d0e" stroke="#D4AF37" stroke-width="1"/>
                <path d="M50 20 L65 38 L35 38 Z" fill="#D4AF37"/>
                <text x="50" y="85" text-anchor="middle" fill="#D4AF37" font-size="8" font-weight="bold">QIBLA</text>
            </svg>
        </div>

        <table class="prayer-table" id="p-list"></table>
    </div>

    <div id="iqama-screen">
        <div class="arch-decoration"></div>
        <div class="column col-l"></div>
        <div class="column col-r"></div>
        <h1 id="iqama-title" style="color: var(--gold); font-size: 3.5rem;">إقامة الصلاة</h1>
        <button id="iqama-btn-start" onclick="skipIqama()" style="margin-top:40px; background:var(--gold); border:none; padding:15px 40px; font-weight:bold; border-radius:50px; font-size: 1.2rem; cursor: pointer; color: black;">Commencer</button>
    </div>

    <div id="adhan-screen" onclick="stopAdhanAlert()">
        <div class="adhan-pulse">🕌</div>
        <h1 id="adhan-display-title" style="color: var(--gold); font-size: 3rem; margin: 0;">أذان</h1>
        <p id="adhan-display-sub" style="color: white; font-size: 1.2rem; margin-top: 15px;">Appuyez n'importe où pour arrêter</p>
    </div>

    <div id="prayer-screen">
        <button class="btn-back" id="btn-exit" onclick="stopPrayer()">Retour</button>
        <div id="ui-layer">
            <div id="p-name-active" style="font-size: 1.5rem; color: var(--gold); font-weight: bold;">FAJR</div>
            <div class="rakat-display"><span id="curr-r">1</span>/<span id="total-r">2</span></div>
            <div id="sujud-dots" style="font-size: 3.5rem; margin-top:10px;">⚪ ⚪</div>
            <div id="liturgy-label"></div>
        </div>
        <div id="touch-layer"></div>
    </div>

    <script>
        const i18n = {
            ar: { 
                title: "خنزب", names: ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"], iqama: "إقامة الصلاة", back: "رجوع", rakat: "ركعات",
                btnStart: "بدء", adhanTitle: "أذان", adhanSub: "اضغط في أي مكان للإيقاف",
                litIsteghfar: "رَبِّ اغْفِرْ لِي", litTakbir: "اللهُ أَكْبَر", litTachahoud: "التَّشَهُّدّ", litTachahoudFinal: "التَّشَهُّدُّ وَالصَّلَاةُ الإِبْرَاهِيمِيَّة"
            },
            fr: { 
                title: "KHANZAB", names: ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"], iqama: "Iqama", back: "Retour", rakat: "Rakats",
                btnStart: "Commencer", adhanTitle: "Adhan", adhanSub: "Appuyez n'importe où pour arrêter",
                litIsteghfar: "Rabbi ghfir li", litTakbir: "Allahu Akbar", litTachahoud: "Tachahoud", litTachahoudFinal: "Tachahoud & Salât Ibrahimiyya"
            },
            tr: { 
                title: "KHANZAB", names: ["Sabah", "Öğle", "İkindi", "Akşam", "Yatsı"], iqama: "Kamet", back: "Geri", rakat: "Rekat",
                btnStart: "Başla", adhanTitle: "Ezan", adhanSub: "Durdurmak için herhangi bir yere dokunun",
                litIsteghfar: "Rabbim beni bağışla", litTakbir: "Allahu Ekber", litTachahoud: "Teşehhüd", litTachahoudFinal: "Son Teşehhüd & Salli-Barik"
            },
            ur: { 
                title: "خنزب", names: ["فجر", "ظہر", "عصر", "مغرب", "عشاء"], iqama: "اقامت", back: "واپس", rakat: "رکعت",
                btnStart: "شروع کریں", adhanTitle: "اذان", adhanSub: "روکنے کے لیے کہیں भी ٹچ کریں",
                litIsteghfar: "رب اغفر لي", litTakbir: "اللہ اکبر", litTachahoud: "تشہد", litTachahoudFinal: "تشہد اور درود ابراہیمی"
            },
            id: { 
                title: "KHANZAB", names: ["Subuh", "Zuhur", "Ashar", "Maghrib", "Isya"], iqama: "Iqama", back: "Kembali", rakat: "Rakaat",
                btnStart: "Mulai", adhanTitle: "Adzan", adhanSub: "Ketuk di mana saja untuk berhenti",
                litIsteghfar: "Robbighfirlii", litTakbir: "Allahu Akbar", litTachahoud: "Tahiyyat awal", litTachahoudFinal: "Tahiyyat Akhir & Shalawat"
            },
            bn: { 
                title: "খানজাব", names: ["ফজর", "যোহর", "আসর", "মাগরিব", "এশা"], iqama: "একামত", back: "ফিরে যান", rakat: "রাকাত",
                btnStart: "শুরু করুন", adhanTitle: "আযান", adhanSub: "বন্ধ করতে যেকোনো জায়গায় স্পর্শ করুন",
                litIsteghfar: "রব্বিগফিরলি", litTakbir: "আল্লাহু আকবার", litTachahoud: "তাশাহহুদ", litTachahoudFinal: "তাশাহহুদ ও দুরুদে ইব্রাহিম"
            }
        };

        let currentLang = 'ar';
        let prayerTimes = null; // Vaut null au départ tant que l'API n'a pas répondu
        let state = { isPraying: false, isAdhanPlaying: false, lastAdhanTriggered: "", currR: 1, totalR: 0, currS: 0, lastTouch: 0, qiblaAngle: 0, currentPrayerIdx: 0 };

        let adhanSettings = JSON.parse(localStorage.getItem('khanzab_adhan_settings')) || {
            Fajr: true, Dhuhr: true, Asr: true, Maghrib: true, Isha: true
        };

        const sounds = {
            iqama: new Audio('iqama.mp3'),
            isteghfar: new Audio('isteghfar.mp3'),
            takbir: new Audio('takbir.mp3'),
            tachahoud: new Audio('tachahoud.mp3'),
            tachahoud2: new Audio('tachahoud-2.mp3'),
            adhan: new Audio('adhan.mp3')
        };

        function playSound(key) {
            if (sounds[key]) {
                sounds[key].currentTime = 0;
                sounds[key].play().catch(e => console.log("Audio bloqué", e));
            }
        }

        function toggleLang() {
            const dropdown = document.getElementById('lang-dropdown');
            dropdown.style.display = (dropdown.style.display === 'block') ? 'none' : 'block';
        }

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('lang-dropdown').style.display = 'none';
            updateUIStrings();
        }

        function toggleAdhanVolume(pName, event) {
            event.stopPropagation();
            adhanSettings[pName] = !adhanSettings[pName];
            localStorage.setItem('khanzab_adhan_settings', JSON.stringify(adhanSettings));
            updateUIStrings();
        }

        function startIqama(name, r, idx) {
            state.totalR = r; 
            state.currentPrayerIdx = idx;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('iqama-screen').style.display = 'flex';
            
            updateUIStrings();
            playSound('iqama');
            
            sounds.iqama.onended = () => { launchPrayer(); };
        }

        function skipIqama() { 
            sounds.iqama.pause();
            sounds.iqama.currentTime = 0;
            launchPrayer(); 
        }

        function launchPrayer() {
            document.getElementById('iqama-screen').style.display = 'none';
            document.getElementById('prayer-screen').style.display = 'flex';
            state.isPraying = true; state.currR = 1; state.currS = 0;
            
            document.getElementById('p-name-active').innerText = i18n[currentLang].names[state.currentPrayerIdx];
            document.getElementById('total-r').innerText = state.totalR;
            updateUI();
            
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        }

        function checkPrayerTime() {
            if (state.isPraying || state.isAdhanPlaying || !prayerTimes) return;

            const now = new Date();
            const currentTimeString = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            const pMap = [
                { id: 'Fajr', key: 'Fajr' },
                { id: 'Dhuhr', key: 'Dhuhr' },
                { id: 'Asr', key: 'Asr' },
                { id: 'Maghrib', key: 'Maghrib' },
                { id: 'Isha', key: 'Isha' }
            ];

            pMap.forEach((p, index) => {
                let pTime = prayerTimes[p.id];
                if (pTime) {
                    pTime = pTime.split(' ')[0]; 
                    if (currentTimeString === pTime && state.lastAdhanTriggered !== currentTimeString) {
                        state.lastAdhanTriggered = currentTimeString;
                        if (adhanSettings[p.key]) {
                            triggerAdhanAlert(index);
                        }
                    }
                }
            });
        }

        function triggerAdhanAlert(prayerIndex) {
            state.isAdhanPlaying = true;
            const t = i18n[currentLang];
            document.getElementById('adhan-display-title').innerText = `${t.adhanTitle} - ${t.names[prayerIndex]}`;
            document.getElementById('adhan-display-sub').innerText = t.adhanSub;
            document.getElementById('adhan-screen').style.display = 'flex';
            
            sounds.adhan.loop = false;
            playSound('adhan');
            sounds.adhan.onended = () => { stopAdhanAlert(); };
        }

        function stopAdhanAlert() {
            sounds.adhan.pause();
            sounds.adhan.currentTime = 0;
            state.isAdhanPlaying = false;
            document.getElementById('adhan-screen').style.display = 'none';
        }

        document.getElementById('touch-layer').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - state.lastTouch < 1200) return;
            state.lastTouch = now;
            
            sounds.tachahoud.onended = null;
            sounds.tachahoud2.onended = null;

            state.currS++;
            const t = i18n[currentLang];
            
            if (state.currS === 1) {
                playSound('isteghfar');
                document.getElementById('liturgy-label').innerText = t.litIsteghfar;
                document.getElementById('sujud-dots').innerHTML = "🟢 ⚪";
            } else if (state.currS === 2) {
                document.getElementById('sujud-dots').innerHTML = "🟢 🟢";
                const isFinal = (state.currR === state.totalR);
                const isEven = (state.currR % 2 === 0);
                
                if (isFinal) {
                    playSound('tachahoud2');
                    document.getElementById('liturgy-label').innerText = t.litTachahoudFinal;
                    sounds.tachahoud2.onended = () => { stopPrayer(); };
                } else {
                    if (isEven) {
                        playSound('tachahoud');
                        document.getElementById('liturgy-label').innerText = t.litTachahoud;
                        sounds.tachahoud.onended = () => { state.currR++; state.currS = 0; updateUI(); };
                    } else {
                        playSound('takbir');
                        document.getElementById('liturgy-label').innerText = t.litTakbir;
                        setTimeout(() => { state.currR++; state.currS = 0; updateUI(); }, 2000);
                    }
                }
            }
        });

        function updateUI() {
            document.getElementById('curr-r').innerText = state.currR;
            document.getElementById('sujud-dots').innerHTML = "⚪ ⚪";
            document.getElementById('liturgy-label').innerText = "";
        }

        function stopPrayer() {
            state.isPraying = false; 
            Object.values(sounds).forEach(s => { s.pause(); s.currentTime = 0; s.onended = null; });
            document.getElementById('prayer-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        }

                async function fetchTimes() {
            try {
                // Détection automatique de la ville et du pays de l'utilisateur
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?method=5&city=auto&country=auto');
                const data = await res.json();
                prayerTimes = data.data.timings;
                updateUIStrings();
            } catch (e) { 
                // Secours sur Tunis si la détection automatique échoue
                try {
                    const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Tunis&country=Tunisia&method=5');
                    const data = await res.json();
                    prayerTimes = data.data.timings;
                    updateUIStrings();
                } catch(err) {
                    updateUIStrings(); 
                }
            }
        }

        }

        // --- SÉCURISÉE ET BLINDÉE CONTRE LA DISPARITION ---
        function updateUIStrings() {
            const t = i18n[currentLang];
            
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('btn-exit').innerText = t.back;
            document.getElementById('iqama-title').innerText = t.iqama;
            document.getElementById('iqama-btn-start').innerText = t.btnStart;
            
            if (state.isPraying) {
                document.getElementById('p-name-active').innerText = t.names[state.currentPrayerIdx];
            }
            
            const pMap = [
                {id:'Fajr', r:2, key:'Fajr'},
                {id:'Dhuhr', r:4, key:'Dhuhr'},
                {id:'Asr', r:4, key:'Asr'},
                {id:'Maghrib', r:3, key:'Maghrib'},
                {id:'Isha', r:4, key:'Isha'}
            ];
            
            const list = document.getElementById('p-list');
            list.innerHTML = pMap.map((p, i) => {
                // SÉCURITÉ CRUCIALE : Si prayerTimes n'est pas encore prêt, on met "--:--" au lieu de crasher
                const time = (prayerTimes && prayerTimes[p.id]) ? prayerTimes[p.id].split(' ')[0] : "--:--";
                const isVolActive = adhanSettings[p.key];
                const volIcon = isVolActive ? '🔊' : '🔇';
                
                return `<tr class="prayer-row">
                    <td style="width: 50px;"><button class="vol-btn" onclick="toggleAdhanVolume('${p.key}', event)">${volIcon}</button></td>
                    <td class="clickable-zone p-time" onclick="startIqama('${t.names[i]}', ${p.r}, ${i})">${time}</td>
                    <td class="clickable-zone" onclick="startIqama('${t.names[i]}', ${p.r}, ${i})">${p.r} ${t.rakat}</td>
                    <td class="clickable-zone" onclick="startIqama('${t.names[i]}', ${p.r}, ${i})">${t.names[i]}</td>
                </tr>`;
            }).join('');
        }

        function initQibla() {
            navigator.geolocation.getCurrentPosition(pos => {
                const latK = 21.4225, lonK = 39.8262;
                const phi = pos.coords.latitude * Math.PI / 180;
                const lambda = pos.coords.longitude * Math.PI / 180;
                const phiK = latK * Math.PI / 180;
                const lambdaK = lonK * Math.PI / 180;
                const y = Math.sin(lambdaK - lambda);
                const x = Math.cos(phi) * Math.tan(phiK) - Math.sin(phi) * Math.cos(lambdaK - lambda);
                state.qiblaAngle = Math.atan2(y, x) * 180 / Math.PI;
            });

            window.addEventListener('deviceorientationabsolute', e => {
                let heading = e.alpha || e.webkitCompassHeading;
                if (heading) {
                    const rotation = state.qiblaAngle - heading;
                    document.getElementById('prayer-rug').style.transform = `rotate(${-rotation + 180}deg)`;
                }
            }, true);
        }

        window.onload = () => { 
            updateUIStrings(); // On affiche tout de suite l'interface avec les textes traduits
            fetchTimes(); // On lance l'appel réseau pour récupérer les vraies heures de Tunis
            initQibla(); 
            setInterval(checkPrayerTime, 3000); // Lance la surveillance de l'Adhan
        };
    </script>
</body>
</html>
