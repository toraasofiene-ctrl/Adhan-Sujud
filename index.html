<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#097969">
    <title>Khanzab - Compteur de Rakat</title>

    <!-- Manifest PWA Intégré -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIktoYW56YWIiLAogICJzaG9ydF9uYW1lIjogIktoYW56YWIiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgIm9yaWVudGF0aW9uIjogImFueSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzA5Nzk2OSIsCiAgInRoZW1lX2NvbG9yIjogIzA5Nzk2OSIKfQ==">

    <style>
        :root {
            --emerald: #097969;
            --gold: #D4AF37;
            --black: #000000;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: var(--emerald);
        }

        /* --- ACCUEIL --- */
        #home-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--emerald);
            background-image: radial-gradient(circle at 50% 50%, rgba(255,215,0,0.1) 0%, transparent 80%);
            color: white;
            padding: 20px;
            overflow-y: auto;
            border: 8px solid var(--gold);
            border-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h40v40H0V0zm20 20l10 10M10 30l10-10L10 10m20 0L20 20' stroke='%23D4AF37' fill='none'/%3E%3C/svg%3E") 30 repeat;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin: 10px 0;
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .qibla-container {
            text-align: center;
            margin-bottom: 15px;
        }

        #compass {
            width: 80px;
            height: 80px;
            transition: transform 0.1s ease-out;
        }

        .prayer-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .prayer-row {
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid var(--gold);
            cursor: pointer;
            transition: background 0.3s;
        }

        .prayer-row:active {
            background: rgba(212, 175, 55, 0.3);
        }

        .prayer-row td {
            padding: 15px;
            font-size: 1.2rem;
            text-align: center;
        }

        .city-tag {
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        /* --- ECRAN DE PRIERE (LANDSCAPE) --- */
        #prayer-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--black);
            color: white;
            z-index: 1000;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
        }

        .counter-container {
            flex: 1;
            text-align: center;
        }

        .rakat-display {
            font-size: 10rem;
            font-weight: bold;
            line-height: 1;
        }

        .rakat-label {
            font-size: 2rem;
            color: var(--gold);
        }

        .tachahoud-alert {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            color: #ff3e3e;
            font-weight: bold;
            text-transform: uppercase;
            animation: pulse 1s infinite;
            display: none;
        }

        /* --- ZONE TACTILE SECURISEE --- */
        #touch-zone {
            width: 30%;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid rgba(212, 175, 55, 0.2);
        }

        .finger-indicator {
            width: 60px;
            height: 60px;
            border: 4px solid var(--gold);
            border-radius: 50%;
            position: relative;
            animation: blink 1.5s infinite;
        }

        .finger-indicator::after {
            content: '☝️';
            font-size: 30px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* --- CONTROLES --- */
        .btn-exit {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- Ecran Accueil -->
    <div id="home-screen">
        <h1>KHANZAB</h1>
        
        <div class="qibla-container">
            <svg id="compass" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#D4AF37" stroke-width="2"/>
                <polygon points="50,10 60,40 40,40" fill="#D4AF37" id="arrow"/>
                <text x="50" y="65" text-anchor="middle" fill="white" font-size="8">QIBLA</text>
            </svg>
            <div id="location-info" class="city-tag">Chargement localisation...</div>
        </div>

        <table class="prayer-table">
            <tr class="prayer-row" onclick="startPrayer('Fajr', 2)">
                <td>Fajr</td>
                <td>2 Rakat</td>
                <td id="time-fajr">--:--</td>
            </tr>
            <tr class="prayer-row" onclick="startPrayer('Dhuhr', 4)">
                <td>Dhuhr</td>
                <td>4 Rakat</td>
                <td id="time-dhuhr">--:--</td>
            </tr>
            <tr class="prayer-row" onclick="startPrayer('Asr', 4)">
                <td>Asr</td>
                <td>4 Rakat</td>
                <td id="time-asr">--:--</td>
            </tr>
            <tr class="prayer-row" onclick="startPrayer('Maghrib', 3)">
                <td>Maghrib</td>
                <td>3 Rakat</td>
                <td id="time-maghrib">--:--</td>
            </tr>
            <tr class="prayer-row" onclick="startPrayer('Isha', 4)">
                <td>Isha</td>
                <td>4 Rakat</td>
                <td id="time-isha">--:--</td>
            </tr>
        </table>

        <div style="margin-top: 20px; text-align: center;">
            <input type="text" id="manual-city" placeholder="Ville (ex: Tunis)" style="padding:8px; border-radius:5px; border:none;">
            <button onclick="updatePrayerTimesManual()" style="padding:8px; background:var(--gold); border:none; border-radius:5px; font-weight:bold;">OK</button>
        </div>
    </div>

    <!-- Ecran Prière -->
    <div id="prayer-screen">
        <button class="btn-exit" onclick="stopPrayer()">Quitter</button>
        
        <div class="counter-container">
            <div class="rakat-label" id="prayer-name-display">PRIÈRE</div>
            <div class="rakat-display"><span id="current-rakat">1</span>/<span id="total-rakat">4</span></div>
            <div id="sujud-dots" style="font-size: 2rem;">⚪ ⚪</div>
        </div>

        <div id="tachahoud-msg" class="tachahoud-alert">TACHAHOUD</div>

        <div id="touch-zone">
            <div class="finger-indicator"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        let state = {
            isPraying: false,
            currentPrayer: "",
            totalRakat: 0,
            currentRakat: 1,
            currentSujud: 0,
            lastTouch: 0,
            city: "Tunis",
            method: 5 // Egyptian General Authority of Survey (Tunisie)
        };

        // --- AUDIO (Synthèse vocale pour compatibilité offline) ---
        function playTakbir() {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance("Allahu Akbar");
                msg.lang = 'ar-SA';
                msg.rate = 1.2;
                window.speechSynthesis.speak(msg);
            }
        }

        // --- GESTION DES PRIÈRES ---
        function startPrayer(name, rakat) {
            state.isPraying = true;
            state.currentPrayer = name;
            state.totalRakat = rakat;
            state.currentRakat = 1;
            state.currentSujud = 0;

            document.getElementById('prayer-name-display').innerText = name.toUpperCase();
            document.getElementById('total-rakat').innerText = rakat;
            updateDisplay();

            // Passage en plein écran et paysage (si supporté)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }

            document.getElementById('prayer-screen').style.display = 'flex';
        }

        function stopPrayer() {
            state.isPraying = false;
            document.getElementById('prayer-screen').style.display = 'none';
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(() => {});
            }
        }

        // --- LOGIQUE COMPTEUR (TACTILE) ---
        const touchZone = document.getElementById('touch-zone');
        touchZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - state.lastTouch < 600) return; // Sécurité anti-parasitage 600ms
            
            state.lastTouch = now;
            handleSujud();
        });

        function handleSujud() {
            playTakbir();
            state.currentSujud++;

            if (state.currentSujud >= 2) {
                // Rakat terminée
                setTimeout(() => {
                    if (state.currentRakat >= state.totalRakat) {
                        completePrayer();
                    } else {
                        state.currentRakat++;
                        state.currentSujud = 0;
                        updateDisplay();
                    }
                }, 1000);
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('current-rakat').innerText = state.currentRakat;
            
            // Affichage Sujud
            let dots = "";
            for(let i=0; i<2; i++) {
                dots += (i < state.currentSujud) ? "🟢 " : "⚪ ";
            }
            document.getElementById('sujud-dots').innerHTML = dots;

            // Logique Tachahoud
            const tachahoud = document.getElementById('tachahoud-msg');
            tachahoud.style.display = 'none';

            // Tachahoud intermédiaire (2ème rakat pour prières > 2)
            if (state.currentRakat === 2 && state.totalRakat > 2 && state.currentSujud === 2) {
                tachahoud.innerText = "TACHAHOUD (1/2)";
                tachahoud.style.display = 'block';
            }
            // Tachahoud Final
            if (state.currentRakat === state.totalRakat && state.currentSujud === 2) {
                tachahoud.innerText = "TACHAHOUD FINAL";
                tachahoud.style.display = 'block';
            }
        }

        function completePrayer() {
            alert("Prière terminée. Qu'Allah accepte.");
            stopPrayer();
        }

        // --- API HORAIRES DE PRIÈRE ---
        async function fetchPrayerTimes(lat, lon, city = null) {
            let url = city 
                ? `https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Tunisia&method=${state.method}`
                : `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=${state.method}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                const times = data.data.timings;
                
                document.getElementById('time-fajr').innerText = times.Fajr;
                document.getElementById('time-dhuhr').innerText = times.Dhuhr;
                document.getElementById('time-asr').innerText = times.Asr;
                document.getElementById('time-maghrib').innerText = times.Maghrib;
                document.getElementById('time-isha').innerText = times.Isha;
                document.getElementById('location-info').innerText = city || "Position GPS active";
            } catch (error) {
                console.error("Erreur API", error);
            }
        }

        function updatePrayerTimesManual() {
            const city = document.getElementById('manual-city').value;
            if (city) fetchPrayerTimes(null, null, city);
        }

        // --- GEOLOCALISATION & BOUSSOLE ---
        function initGeo() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => fetchPrayerTimes(pos.coords.latitude, pos.coords.longitude),
                    () => fetchPrayerTimes(null, null, "Tunis")
                );
            }
            
            // Boussole (nécessite HTTPS et permission sur certains mobiles)
            window.addEventListener('deviceorientationabsolute', (e) => {
                let heading = e.alpha || e.webkitCompassHeading;
                if (heading) {
                    // Qibla approximative pour la Tunisie est ~100° (Est-Sud-Est)
                    // On fait tourner la flèche par rapport au Nord
                    const qiblaAngle = 100; 
                    document.getElementById('arrow').style.transformOrigin = "50% 50%";
                    document.getElementById('compass').style.transform = `rotate(${-heading + qiblaAngle}deg)`;
                }
            }, true);
        }

        // Initialisation au chargement
        window.onload = () => {
            initGeo();
            // Demander la permission audio au premier clic
            document.body.addEventListener('click', () => {
                if (window.speechSynthesis.paused) window.speechSynthesis.resume();
            }, { once: true });
        };

        // Service Worker pour mode Offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGV2ID0+IGV2LnJlc3BvbmRXaXRoKGZldGNoKGV2LnJlcXVlc3QpKSk7');
        }
    </script>
</body>
</html>
