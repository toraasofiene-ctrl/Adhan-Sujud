<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Khanzab Pro</title>
    <style>
        :root {
            --emerald: #097969;
            --gold: #D4AF37;
            --black: #000000;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; 
            background: var(--emerald); color: white;
        }

        /* --- ACCUEIL --- */
        #home-screen {
            display: flex; flex-direction: column; height: 100%; padding: 15px;
            background: radial-gradient(circle, var(--emerald) 0%, #043932 100%);
            border: 8px solid var(--gold); overflow-y: auto; text-align: center;
        }

        .lang-bar { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: white; padding: 5px 8px; border-radius: 4px; font-size: 0.7rem; }
        .lang-btn.active { background: var(--gold); color: black; }

        .qibla-area { position: relative; width: 140px; height: 140px; margin: 10px auto; }
        #prayer-rug { width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.1, 0.5, 0.1, 1); }

        .prayer-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .prayer-row { background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--gold); height: 50px; cursor: pointer; }
        .prayer-row td { font-size: 1.2rem; font-weight: bold; }

        /* --- IQAMA SCREEN --- */
        #iqama-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--emerald); z-index: 2000; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .iqama-loader { width: 80px; height: 80px; border: 5px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- PRAYER SCREEN (LANDSCAPE) --- */
        #prayer-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--black); z-index: 1000;
        }

        /* Compteur */
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1; pointer-events: none;
        }
        .rakat-display { font-size: 15rem; font-weight: bold; color: var(--gold); line-height: 1; }
        #liturgy-label { font-size: 2.5rem; color: var(--white); font-weight: bold; margin-top: 20px; text-shadow: 0 0 10px var(--gold); }

        /* ZONE TACTILE TOTALE (100%) */
        #touch-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; cursor: pointer;
        }

        .btn-exit { position: absolute; top: 20px; left: 20px; z-index: 10; background: #333; color: white; border: 1px solid var(--gold); padding: 10px; }
    </style>
</head>
<body>

    <!-- ACCUEIL -->
    <div id="home-screen">
        <div class="lang-bar">
            <button class="lang-btn active" onclick="setLang('ar')">العربية</button>
            <button class="lang-btn" onclick="setLang('fr')">FR</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
            <button class="lang-btn" onclick="setLang('tr')">TR</button>
            <button class="lang-btn" onclick="setLang('id')">ID</button>
        </div>

        <h1 id="txt-title" style="color: var(--gold);">KHANZAB</h1>
        
        <div class="qibla-area">
            <svg id="prayer-rug" viewBox="0 0 100 140">
                <rect x="10" y="10" width="80" height="120" rx="5" fill="#7b1113" stroke="#D4AF37" stroke-width="2"/>
                <path d="M50 20 L75 45 L75 110 L25 110 L25 45 Z" fill="#5a0d0e" stroke="#D4AF37" stroke-width="1"/>
                <path d="M50 25 L65 40 L35 40 Z" fill="#D4AF37"/>
                <text x="50" y="80" text-anchor="middle" fill="#D4AF37" font-size="8" font-weight="bold">QIBLA</text>
            </svg>
        </div>

        <table class="prayer-table" id="p-list"></table>
    </div>

    <!-- IQAMA -->
    <div id="iqama-screen">
        <div class="iqama-loader"></div>
        <h1 id="iqama-text" style="color: var(--gold);">IQAMA...</h1>
        <p id="iqama-sub" style="font-size: 1.5rem;">Préparez-vous pour la prière</p>
        <button onclick="skipIqama()" style="margin-top:30px; background:transparent; border:1px solid white; color:white; padding:10px;">Passer l'Iqama</button>
    </div>

    <!-- PRIÈRE -->
    <div id="prayer-screen">
        <button class="btn-exit" id="btn-exit" onclick="stopPrayer()">Retour</button>
        <div id="ui-layer">
            <div id="p-name-active" style="font-size: 2rem; color: var(--gold);">FAJR</div>
            <div class="rakat-display"><span id="curr-r">1</span>/<span id="total-r">2</span></div>
            <div id="liturgy-label"></div>
            <div id="sujud-dots" style="font-size: 3rem;">⚪ ⚪</div>
        </div>
        <!-- ZONE TACTILE COUVRE TOUT L'ÉCRAN -->
        <div id="touch-layer"></div>
    </div>

    <script>
        const i18n = {
            ar: { title: "خنزب", iqama: "إقامة الصلاة...", back: "رجوع", rakat: "ركعات" },
            fr: { title: "KHANZAB", iqama: "Iqama en cours...", back: "Retour", rakat: "Rakats" },
            en: { title: "KHANZAB", iqama: "Iqama...", back: "Back", rakat: "Rakats" }
        };

        let currentLang = 'ar';
        let state = {
            isPraying: false, currR: 1, totalR: 0, currS: 0, lastT: 0, qiblaAngle: 100, iqamaTimer: null
        };

        // --- MOTEUR VOCAL (HOMME) ---
        function speak(text, isIqama = false) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            const voices = window.speechSynthesis.getVoices();
            const male = voices.find(v => v.lang.includes('ar') && (v.name.includes('Male') || v.name.includes('Masculine')));
            if (male) msg.voice = male;
            msg.pitch = 0.75; 
            msg.rate = isIqama ? 0.9 : 0.8;
            window.speechSynthesis.speak(msg);
        }

        // --- IQAMA ---
        function startIqama(name, r) {
            state.totalR = r;
            state.currentName = name;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('iqama-screen').style.display = 'flex';
            document.getElementById('iqama-text').innerText = i18n[currentLang].iqama;

            // Appel sonore de l'Iqama
            speak("الله أكبر ، الله أكبر. أشهد أن لا إله إلا الله. أشهد أن محمدا رسول الله. حي على الصلاة ، حي على الفلاح. قد قامت الصلاة ، قد قامت الصلاة. الله أكبر ، الله أكبر. لا إله إلا الله", true);

            state.iqamaTimer = setTimeout(() => {
                launchPrayer();
            }, 12000); // Transition auto après l'iqama
        }

        function skipIqama() {
            clearTimeout(state.iqamaTimer);
            window.speechSynthesis.cancel();
            launchPrayer();
        }

        function launchPrayer() {
            document.getElementById('iqama-screen').style.display = 'none';
            document.getElementById('prayer-screen').style.display = 'block';
            state.isPraying = true;
            state.currR = 1; state.currS = 0;
            document.getElementById('p-name-active').innerText = state.currentName;
            document.getElementById('total-r').innerText = state.totalR;
            updateUI();

            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        }

        // --- LOGIQUE TACTILE TOTALE ---
        document.getElementById('touch-layer').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - state.lastT < 1200) return;
            state.lastT = now;
            handleStep();
        });

        function handleStep() {
            state.currS++;

            if (state.currS === 1) {
                // Touche 1 : Istighfar
                speak("استغفر الله");
                document.getElementById('liturgy-label').innerText = "إستغفار";
                document.getElementById('sujud-dots').innerHTML = "🟢 ⚪";
            } else {
                // Touche 2
                document.getElementById('sujud-dots').innerHTML = "🟢 🟢";
                const isLast = (state.currR === state.totalR);
                const isEven = (state.currR % 2 === 0);

                if (isLast) {
                    speak("تشهد و الصلاة الإبراهيمية");
                    document.getElementById('liturgy-label').innerText = "تشهد و الصلاة الإبراهيمية";
                    setTimeout(() => { stopPrayer(); alert("Accepté."); }, 6000);
                } else if (isEven) {
                    speak("تشهد");
                    document.getElementById('liturgy-label').innerText = "تشهد";
                    nextRakat();
                } else {
                    speak("الله أكبر");
                    document.getElementById('liturgy-label').innerText = "الله أكبر";
                    nextRakat();
                }
            }
        }

        function nextRakat() {
            setTimeout(() => {
                state.currR++; state.currS = 0;
                updateUI();
            }, 2500);
        }

        function updateUI() {
            document.getElementById('curr-r').innerText = state.currR;
            document.getElementById('sujud-dots').innerHTML = "⚪ ⚪";
            document.getElementById('liturgy-label').innerText = "";
        }

        function stopPrayer() {
            state.isPraying = false;
            document.getElementById('prayer-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        }

        // --- BOUSSOLE STABLE (ANTI-DÉRIVE) ---
        let lastHeading = 0;
        function initQibla() {
            navigator.geolocation.getCurrentPosition(pos => {
                const latK = 21.4225, lonK = 39.8262;
                const phi = pos.coords.latitude * Math.PI / 180;
                const lambda = pos.coords.longitude * Math.PI / 180;
                const phiK = latK * Math.PI / 180;
                const lambdaK = lonK * Math.PI / 180;
                const y = Math.sin(lambdaK - lambda);
                const x = Math.cos(phi) * Math.tan(phiK) - Math.sin(phi) * Math.cos(lambdaK - lambda);
                state.qiblaAngle = Math.atan2(y, x) * 180 / Math.PI;
            });

            // Utilisation du capteur absolu pour Android/Xiaomi
            window.addEventListener('deviceorientationabsolute', e => {
                let heading = e.alpha || e.webkitCompassHeading;
                if (heading !== null) {
                    // Lissage simple pour éviter les vibrations (Jitter)
                    if (Math.abs(heading - lastHeading) > 0.5) {
                        const rotation = state.qiblaAngle - heading;
                        document.getElementById('prayer-rug').style.transform = `rotate(${-rotation}deg)`;
                        lastHeading = heading;
                    }
                }
            }, true);
        }

        // --- INIT ---
        function setLang(l) { currentLang = l; updateStrings(); }
        function updateStrings() {
            document.getElementById('txt-title').innerText = i18n[currentLang].title;
            const t = i18n[currentLang];
            const prayers = [{n:'Fajr',r:2},{n:'Dhuhr',r:4},{n:'Asr',r:4},{n:'Maghrib',r:3},{n:'Isha',r:4}];
            document.getElementById('p-list').innerHTML = prayers.map(p => `
                <tr class="prayer-row" onclick="startIqama('${p.n}', ${p.r})">
                    <td>${p.n}</td><td>${p.r} ${t.rakat}</td>
                </tr>
            `).join('');
        }

        window.onload = () => {
            updateStrings();
            initQibla();
            document.body.addEventListener('click', () => { speak(""); }, {once: true});
        };
    </script>
</body>
</html>
