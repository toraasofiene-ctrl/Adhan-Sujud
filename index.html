<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Khanzab PWA</title>
    <style>
        :root {
            --emerald: #097969;
            --gold: #D4AF37;
            --black: #000000;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; 
            background: var(--emerald); color: white;
        }

        /* --- ACCUEIL --- */
        #home-screen {
            display: flex; flex-direction: column; height: 100%; padding: 10px;
            background: radial-gradient(circle, var(--emerald) 0%, #043932 100%);
            border: 8px solid var(--gold); overflow-y: auto;
            position: relative;
        }

        .sphere-container {
            position: absolute; top: 20px; right: 20px;
            display: flex; align-items: center; z-index: 100;
        }
        .striated-sphere {
            width: 45px; height: 45px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fcf6ba, #bf953f, #aa771c);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset -2px -2px 6px rgba(0,0,0,0.5);
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 3px, transparent 4px);
            cursor: pointer; transition: transform 0.3s; border: 1px solid rgba(255,255,255,0.2);
        }

        #lang-dropdown {
            display: none; position: absolute; top: 50px; right: 0;
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--gold);
            border-radius: 8px; padding: 10px; width: 120px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .lang-option { padding: 10px; font-size: 0.9rem; border-bottom: 1px solid rgba(212, 175, 55, 0.2); text-align: right; cursor: pointer; }
        .lang-option:last-child { border-bottom: none; }

        .header h1 { text-align: center; color: var(--gold); margin: 5px 0; font-size: 2rem; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .qibla-area { position: relative; width: 140px; height: 160px; margin: 0 auto 10px; }
        #prayer-rug { width: 100%; height: 100%; transition: transform 0.4s cubic-bezier(0.1, 0.5, 0.1, 1); filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }

        .prayer-table { width: 100%; border-collapse: collapse; direction: rtl; margin-top: 10px; }
        .prayer-row { background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--gold); height: 55px; cursor: pointer; }
        .prayer-row td { text-align: center; font-size: 1.1rem; font-weight: bold; padding: 0 5px; }
        .p-time { color: var(--gold); font-size: 0.9rem !important; }
        .mute-btn { font-size: 1.4rem; cursor: pointer; padding: 5px; }

        /* --- IQAMA SCREEN --- */
        #iqama-screen {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: var(--emerald); border: 15px solid var(--gold);
            border-image: linear-gradient(to right, #bf953f, #fcf6ba, #b38728) 1;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .arch-decoration { position: absolute; top: 0; width: 70%; height: 150px; border: 5px solid var(--gold); border-bottom: none; border-radius: 50% 50% 0 0; opacity: 0.3; }
        .column { position: absolute; bottom: 0; width: 30px; height: 70%; background: linear-gradient(to right, #b38728, #fcf6ba, #b38728); }
        .col-l { left: 15px; } .col-r { right: 15px; }

        /* --- ÉCRAN DE PRIÈRE --- */
        #prayer-screen { display: none; position: fixed; inset: 0; background: var(--black); z-index: 3000; }
        #ui-layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; pointer-events: none; }
        .rakat-display { font-size: 14rem; font-weight: bold; color: var(--gold); line-height: 1; }
        #liturgy-label { font-size: 2.5rem; color: var(--white); text-align: center; margin-top: 10px; font-weight: bold; }
        #touch-layer { position: absolute; width: 100%; height: 100%; z-index: 5; cursor: pointer; }
        .btn-back { position: absolute; top: 15px; left: 15px; z-index: 10; background: #222; border: 1px solid var(--gold); color: white; padding: 8px 15px; }

        /* --- ALERTE ADHAN --- */
        #adhan-alert {
            display: none; position: fixed; inset: 0; z-index: 5000;
            background: rgba(0,0,0,0.95); flex-direction: column;
            justify-content: center; align-items: center; text-align: center; cursor: pointer;
        }
        .adhan-icon { font-size: 5rem; color: var(--gold); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <!-- ACCUEIL -->
    <div id="home-screen">
        <div class="sphere-container">
            <div class="striated-sphere" onclick="toggleLang()"></div>
            <div id="lang-dropdown">
                <div class="lang-option" onclick="setLang('ar')">العربية</div>
                <div class="lang-option" onclick="setLang('fr')">Français</div>
                <div class="lang-option" onclick="setLang('tr')">Türkçe</div>
                <div class="lang-option" onclick="setLang('ur')">اردو</div>
                <div class="lang-option" onclick="setLang('id')">Bahasa</div>
                <div class="lang-option" onclick="setLang('bn')">বাংলা</div>
            </div>
        </div>

        <div class="header"><h1 id="txt-title">KHANZAB</h1></div>
        
        <div class="qibla-area">
            <svg id="prayer-rug" viewBox="0 0 100 140">
                <rect x="10" y="10" width="80" height="120" rx="5" fill="#7b1113" stroke="#D4AF37" stroke-width="2"/>
                <path d="M50 15 L75 40 L75 115 L25 115 L25 40 Z" fill="#5a0d0e" stroke="#D4AF37" stroke-width="1"/>
                <path d="M50 20 L65 38 L35 38 Z" fill="#D4AF37"/>
                <text x="50" y="85" text-anchor="middle" fill="#D4AF37" font-size="8" font-weight="bold">QIBLA</text>
            </svg>
        </div>

        <table class="prayer-table" id="p-list"></table>
    </div>

    <!-- IQAMA -->
    <div id="iqama-screen">
        <div class="arch-decoration"></div>
        <div class="column col-l"></div>
        <div class="column col-r"></div>
        <h1 id="iqama-title" style="color: var(--gold); font-size: 3.5rem;">إقامة الصلاة</h1>
        <button onclick="skipIqama()" style="margin-top:40px; background:var(--gold); border:none; padding:15px 40px; font-weight:bold; border-radius:50px; font-size: 1.2rem;">Commencer</button>
    </div>

    <!-- PRIÈRE -->
    <div id="prayer-screen">
        <button class="btn-back" id="btn-exit" onclick="stopPrayer()">Retour</button>
        <div id="ui-layer">
            <div id="p-name-active" style="font-size: 1.5rem; color: var(--gold); font-weight: bold;">FAJR</div>
            <div class="rakat-display"><span id="curr-r">1</span>/<span id="total-r">2</span></div>
            <div id="sujud-dots" style="font-size: 3.5rem; margin-top:10px;">⚪ ⚪</div>
            <div id="liturgy-label"></div>
        </div>
        <div id="touch-layer"></div>
    </div>

    <!-- ALERTE ADHAN -->
    <div id="adhan-alert" onclick="closeAdhan()">
        <div class="adhan-icon">🔊</div>
        <h1 id="adhan-name" style="color:var(--gold); font-size:3rem;">ADHAN</h1>
        <p style="font-size:1.5rem;">Toucher pour arrêter</p>
    </div>

    <script>
        const i18n = {
            ar: { title: "خنزب", names: ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"], iqama: "إقامة الصلاة", back: "رجوع", rakat: "ركعات" },
            fr: { title: "KHANZAB", names: ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"], iqama: "Iqama", back: "Retour", rakat: "Rakats" },
            tr: { title: "KHANZAB", names: ["Sabah", "Öğle", "İkindi", "Akşam", "Yatsı"], iqama: "Kamet", back: "Geri", rakat: "Rekat" },
            ur: { title: "خنزب", names: ["فجر", "ظہر", "عصر", "مغرب", "عشاء"], iqama: "اقامت", back: "واپس", rakat: "رکعت" },
            id: { title: "KHANZAB", names: ["Subuh", "Zuhur", "Ashar", "Maghrib", "Isya"], iqama: "Iqama", back: "Kembali", rakat: "Rakaat" },
            bn: { title: "খানজাব", names: ["ফজর", "যোহর", "আসর", "মাগরিব", "এশা"], iqama: "একামত", back: "ফিরে যান", rakat: "রাকাত" }
        };

        const prayerIds = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
        let currentLang = 'ar';
        let prayerTimes = {};
        let state = { isPraying: false, currR: 1, totalR: 0, currS: 0, lastTouch: 0, qiblaAngle: 0, timer: null };

        // --- AUDIO CONFIGURATION ---
        const sounds = {};
        const audioFiles = {
            iqama: 'iqama.mp3',
            istighfar: 'istighfar.mp3',
            allahuAkbar: 'allahu-akbar.mp3',
            tachahoud: 'tachahoud.mp3',
            tachahoudFinal: 'tachahoud-final.mp3',
            adhan: 'adhan.mp3'
        };

        // Création et pré-chargement
        Object.keys(audioFiles).forEach(key => {
            sounds[key] = new Audio(audioFiles[key]);
            sounds[key].preload = 'auto';
            sounds[key].load();
        });

        // Déblocage au premier clic/toucher (Crucial pour Xiaomi/Android)
        function unlockAudio() {
            Object.values(sounds).forEach(s => {
                s.play().then(() => {
                    s.pause();
                    s.currentTime = 0;
                }).catch(() => {});
            });
            window.removeEventListener('click', unlockAudio);
            window.removeEventListener('touchstart', unlockAudio);
            console.log("Audio unlocked and ready.");
        }
        window.addEventListener('click', unlockAudio);
        window.addEventListener('touchstart', unlockAudio);

        function playSound(key) {
            const s = sounds[key];
            if (s) {
                s.pause();
                s.currentTime = 0;
                let playPromise = s.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Playback failed:", error);
                    });
                }
            }
        }

        // --- PREFERENCES ADHAN ---
        let adhanSettings = JSON.parse(localStorage.getItem('khanzab_adhan')) || { Fajr: true, Dhuhr: true, Asr: true, Maghrib: true, Isha: true };

        function toggleMute(pId, event) {
            event.stopPropagation();
            adhanSettings[pId] = !adhanSettings[pId];
            localStorage.setItem('khanzab_adhan', JSON.stringify(adhanSettings));
            updateUIStrings();
        }

        function toggleLang() {
            const dropdown = document.getElementById('lang-dropdown');
            dropdown.style.display = (dropdown.style.display === 'block') ? 'none' : 'block';
        }

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('lang-dropdown').style.display = 'none';
            updateUIStrings();
        }

        // --- LOGIQUE IQAMA / PRAYER ---
        function startIqama(name, r) {
            state.totalR = r; state.currentName = name;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('iqama-screen').style.display = 'flex';
            playSound('iqama');
            state.timer = setTimeout(() => launchPrayer(), 14500);
        }

        function skipIqama() { 
            clearTimeout(state.timer); 
            sounds.iqama.pause();
            launchPrayer(); 
        }

        function launchPrayer() {
            document.getElementById('iqama-screen').style.display = 'none';
            document.getElementById('prayer-screen').style.display = 'flex';
            state.isPraying = true; state.currR = 1; state.currS = 0;
            document.getElementById('p-name-active').innerText = state.currentName;
            document.getElementById('total-r').innerText = state.totalR;
            updateUI();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        }

        // --- LOGIQUE TACTILE (PAGE SUIVI) ---
        document.getElementById('touch-layer').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const now = Date.now();
            // Délai de sécurité anti-rebond légèrement réduit à 1s pour plus de réactivité
            if (now - state.lastTouch < 1000) return;
            state.lastTouch = now;

            state.currS++;
            if (state.currS === 1) {
                playSound('istighfar');
                document.getElementById('liturgy-label').innerText = "إستغفار";
                document.getElementById('sujud-dots').innerHTML = "🟢 ⚪";
            } else if (state.currS === 2) {
                document.getElementById('sujud-dots').innerHTML = "🟢 🟢";
                const isFinal = (state.currR === state.totalR);
                const isEven = (state.currR % 2 === 0);
                
                if (isFinal) {
                    playSound('tachahoudFinal');
                    document.getElementById('liturgy-label').innerText = "تشهد و الصلاة الإبراهيمية";
                    setTimeout(() => stopPrayer(), 6000);
                } else {
                    if (isEven) {
                        playSound('tachahoud');
                        document.getElementById('liturgy-label').innerText = "تشهد";
                    } else {
                        playSound('allahuAkbar');
                        document.getElementById('liturgy-label').innerText = "الله أكبر";
                    }
                    // Passage à la rakat suivante
                    setTimeout(() => { 
                        state.currR++; 
                        state.currS = 0; 
                        updateUI(); 
                    }, 2500);
                }
            }
        });

        function updateUI() {
            document.getElementById('curr-r').innerText = state.currR;
            document.getElementById('sujud-dots').innerHTML = "⚪ ⚪";
            document.getElementById('liturgy-label').innerText = "";
        }

        function stopPrayer() {
            state.isPraying = false; 
            Object.values(sounds).forEach(s => { s.pause(); s.currentTime = 0; });
            document.getElementById('prayer-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        }

        // --- ALERTE ADHAN LOGIQUE ---
        function checkAdhan() {
            if (state.isPraying) return;
            const now = new Date();
            const currentTimeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            prayerIds.forEach((pId, index) => {
                if (prayerTimes[pId] === currentTimeStr && adhanSettings[pId]) {
                    triggerAdhan(i18n[currentLang].names[index]);
                }
            });
        }

        function triggerAdhan(name) {
            const alertBox = document.getElementById('adhan-alert');
            if (alertBox.style.display === 'flex') return;
            document.getElementById('adhan-name').innerText = name;
            alertBox.style.display = 'flex';
            playSound('adhan');
            sounds.adhan.onended = () => closeAdhan();
        }

        function closeAdhan() {
            sounds.adhan.pause();
            sounds.adhan.currentTime = 0;
            document.getElementById('adhan-alert').style.display = 'none';
        }

        setInterval(checkAdhan, 60000);

        // --- API & BOUSSOLE ---
        async function fetchTimes() {
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Tunis&country=Tunisia&method=5');
                const data = await res.json();
                prayerTimes = data.data.timings;
                updateUIStrings();
            } catch (e) { updateUIStrings(); }
        }

        function updateUIStrings() {
            const t = i18n[currentLang];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('btn-exit').innerText = t.back;
            document.getElementById('iqama-title').innerText = t.iqama;
            const list = document.getElementById('p-list');
            list.innerHTML = prayerIds.map((pId, i) => {
                const time = prayerTimes[pId] || "--:--";
                const isMuted = !adhanSettings[pId];
                return `<tr class="prayer-row" onclick="startIqama('${t.names[i]}', ${pId === 'Fajr' ? 2 : pId === 'Maghrib' ? 3 : 4})">
                    <td class="mute-btn" onclick="toggleMute('${pId}', event)">${isMuted ? '🔇' : '🔊'}</td>
                    <td class="p-time">${time}</td>
                    <td>${t.names[i]}</td>
                </tr>`;
            }).join('');
        }

        function initQibla() {
            navigator.geolocation.getCurrentPosition(pos => {
                const latK = 21.4225, lonK = 39.8262;
                const phi = pos.coords.latitude * Math.PI / 180;
                const lambda = pos.coords.longitude * Math.PI / 180;
                const phiK = latK * Math.PI / 180;
                const lambdaK = lonK * Math.PI / 180;
                const y = Math.sin(lambdaK - lambda);
                const x = Math.cos(phi) * Math.tan(phiK) - Math.sin(phi) * Math.cos(lambdaK - lambda);
                state.qiblaAngle = Math.atan2(y, x) * 180 / Math.PI;
            });
            window.addEventListener('deviceorientationabsolute', e => {
                let heading = e.alpha || e.webkitCompassHeading;
                if (heading) {
                    const rotation = state.qiblaAngle - heading;
                    document.getElementById('prayer-rug').style.transform = `rotate(${-rotation + 180}deg)`;
                }
            }, true);
        }

        window.onload = () => { fetchTimes(); initQibla(); };
    </script>
</body>
</html>
