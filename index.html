        :root {
            --emerald: #097969;

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: var(--emerald); color: white; }

        /* --- ACCUEIL --- */
        #home-screen { display: flex; flex-direction: column; height: 100%; padding: 15px; background: radial-gradient(circle, var(--emerald) 0%, #043932 100%); border: 8px solid var(--gold); overflow-y: auto; position: relative; }

        #lang-dropdown { display: none; position: absolute; top: 55px; right: 0; background: rgba(0, 0, 0, 0.95); border: 2px solid var(--gold); border-radius: 12px; padding: 5px; width: 140px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .lang-option { padding: 12px; text-align: center; cursor: pointer; color: white; border-bottom: 1px solid rgba(212, 175, 55, 0.3); }

        .header h1 { text-align: center; color: var(--gold); margin: 5px 0 15px 0; font-size: 2.2rem; letter-spacing: 3px; }

        .qibla-area { position: relative; width: 140px; height: 160px; margin: 0 auto 15px; }
        #prayer-rug { width: 100%; height: 100%; transition: transform 0.5s ease-out; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.6)); }
