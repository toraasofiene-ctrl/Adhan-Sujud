<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Khanzab Premium</title>
    <style>
        :root {
            --burgundy: #5d0e1a; /* Couleur de la mosquée */
            --emerald: #065f46;  /* Couleur de la porte */
            --gold: #d4af37;
            --white: #f3f4f6;
            --black: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* --- ACCUEIL (Style Mosquée Bordeaux) --- */
        #home-screen {
            display: flex; flex-direction: column; height: 100%; 
            background: linear-gradient(to bottom, #7a1113, var(--burgundy));
            color: var(--white); padding: 20px; text-align: center;
        }

        .mosque-icon { width: 120px; height: auto; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(0,0,0,0.3)); }

        .qibla-container { position: relative; width: 140px; height: 180px; margin: 20px auto; }
        #prayer-rug { width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.1, 0.8, 0.2, 1); }

        .prayer-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 10px; }
        .prayer-row { background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .prayer-row:active { transform: scale(0.98); background: var(--gold); color: black; }
        .prayer-row td { padding: 15px; font-size: 1.4rem; font-weight: bold; border: 1px solid var(--gold); }

        /* --- IQAMA (Style Porte Verte & Colonnes) --- */
        #iqama-screen {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: var(--emerald);
            background-image: radial-gradient(circle, rgba(0,0,0,0.2) 1px, transparent 1px);
            background-size: 30px 30px;
            border: 15px solid var(--gold);
            border-image: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c) 1;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .golden-arch {
            position: absolute; top: 0; width: 80%; height: 200px;
            border: 8px solid var(--gold); border-bottom: none;
            border-radius: 50% 50% 0 0; opacity: 0.5;
        }

        .column {
            position: absolute; bottom: 0; width: 40px; height: 80%;
            background: linear-gradient(45deg, #b38728 25%, #fcf6ba 50%, #b38728 75%);
            border-radius: 5px; box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .column-left { left: 20px; }
        .column-right { right: 20px; }

        /* --- PRAYER SCREEN (Landscape Black) --- */
        #prayer-screen {
            display: none; position: fixed; inset: 0; background: var(--black); z-index: 3000;
        }
        #ui-layer {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1; pointer-events: none;
        }
        .rakat-num { font-size: 16rem; font-weight: bold; color: var(--gold); line-height: 0.8; }
        #liturgy-label { font-size: 3rem; color: white; margin-top: 30px; text-align: center; }

        /* ZONE TACTILE 100% */
        #touch-layer { position: absolute; inset: 0; z-index: 10; cursor: pointer; }

        .btn-close { position: absolute; top: 20px; left: 20px; z-index: 100; background: #333; color: white; border: 1px solid var(--gold); padding: 12px; }
    </style>
</head>
<body>

    <!-- ACCUEIL -->
    <div id="home-screen">
        <!-- Icone Mosquee inspirée de l'image -->
        <svg class="mosque-icon" viewBox="0 0 200 150">
            <circle cx="100" cy="40" r="30" fill="white" /> <!-- Dôme Central -->
            <path d="M40 130 L40 70 Q40 50 60 50 L140 50 Q160 50 160 70 L160 130 Z" fill="#eee" />
            <rect x="30" y="130" width="140" height="20" fill="white" />
            <circle cx="150" cy="30" r="15" fill="none" stroke="white" stroke-width="2" /> <!-- Lune -->
            <path d="M20 100 Q40 80 60 100 T100 100 T140 100" stroke="white" fill="none" opacity="0.5"/> <!-- Nuages -->
        </svg>

        <h1 style="color: var(--gold); margin: 5px 0;">KHANZAB</h1>
        
        <div class="qibla-container">
            <svg id="prayer-rug" viewBox="0 0 100 140">
                <!-- Le Tapis -->
                <rect x="10" y="10" width="80" height="120" rx="5" fill="#7b1113" stroke="#D4AF37" stroke-width="3"/>
                <!-- Design interne -->
                <path d="M50 25 L70 45 L70 110 L30 110 L30 45 Z" fill="#5d0e1a" stroke="#D4AF37" stroke-width="1"/>
                <!-- FLÈCHE MIHRAB (Pointe vers la Mecque) -->
                <path d="M50 20 L65 38 L35 38 Z" fill="var(--gold)"/> 
                <text x="50" y="80" text-anchor="middle" fill="var(--gold)" font-size="7" font-weight="bold">QIBLA</text>
            </svg>
        </div>

        <table class="prayer-table" id="p-list">
            <!-- JS injecte ici -->
        </table>
    </div>

    <!-- IQAMA (Style Porte Verte) -->
    <div id="iqama-screen">
        <div class="golden-arch"></div>
        <div class="column column-left"></div>
        <div class="column column-right"></div>
        <h1 id="iqama-title" style="color: var(--gold); font-size: 3rem; text-shadow: 2px 2px 5px black;">إقامة الصلاة</h1>
        <div id="iqama-sub" style="font-size: 1.5rem; color: white;">Annonce de la prière...</div>
        <button onclick="skipIqama()" style="margin-top:40px; background:var(--gold); border:none; padding:15px 30px; font-weight:bold; border-radius:50px;">COMMENCER DIRECTEMENT</button>
    </div>

    <!-- PRIÈRE -->
    <div id="prayer-screen">
        <button class="btn-close" onclick="stopPrayer()">RETOUR</button>
        <div id="ui-layer">
            <div id="p-name-active" style="font-size: 2rem; color: var(--gold); text-transform: uppercase;">FAJR</div>
            <div class="rakat-num"><span id="curr-r">1</span>/<span id="total-r">2</span></div>
            <div id="liturgy-label"></div>
            <div id="sujud-dots" style="font-size: 4rem; margin-top:20px;">⚪ ⚪</div>
        </div>
        <div id="touch-layer"></div>
    </div>

    <script>
        const DATA = [
            {n:'Fajr',r:2}, {n:'Dhuhr',r:4}, {n:'Asr',r:4}, {n:'Maghrib',r:3}, {n:'Isha',r:4}
        ];

        let state = {
            isPraying: false, currR: 1, totalR: 0, currS: 0, lastT: 0, qibla: 0, timer: null
        };

        // --- AUDIO MASCULIN HUMAIN ---
        function speak(text, isLong = false) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            const voices = window.speechSynthesis.getVoices();
            // Cherche une voix d'homme arabe
            const maleVoice = voices.find(v => v.lang.includes('ar') && (v.name.includes('Male') || v.name.includes('Masculine')));
            if (maleVoice) msg.voice = maleVoice;
            
            msg.pitch = 0.65; // Voix grave d'homme
            msg.rate = isLong ? 0.9 : 0.8; // Plus solennel
            window.speechSynthesis.speak(msg);
        }

        // --- IQAMA ---
        function startIqama(name, r) {
            state.totalR = r;
            state.currentName = name;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('iqama-screen').style.display = 'flex';
            
            const iqamaText = "الله أكبر ، الله أكبر. أشهد أن لا إله إلا الله. أشهد أن محمدا رسول الله. حي على الصلاة ، حي على الفلاح. قد قامت الصلاة ، قد قامت الصلاة. الله أكبر ، الله أكبر. لا إله إلا الله";
            speak(iqamaText, true);

            state.timer = setTimeout(() => launchPrayer(), 13000);
        }

        function skipIqama() {
            clearTimeout(state.timer);
            launchPrayer();
        }

        function launchPrayer() {
            document.getElementById('iqama-screen').style.display = 'none';
            document.getElementById('prayer-screen').style.display = 'block';
            state.isPraying = true;
            state.currR = 1; state.currS = 0;
            document.getElementById('p-name-active').innerText = state.currentName;
            document.getElementById('total-r').innerText = state.totalR;
            updateUI();
            
            // Xiaomi Landscape Mode
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        }

        // --- LOGIQUE TACTILE ---
        document.getElementById('touch-layer').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - state.lastT < 1200) return;
            state.lastT = now;
            
            state.currS++;
            if (state.currS === 1) {
                speak("استغفر الله");
                document.getElementById('liturgy-label').innerText = "إستغفار";
                document.getElementById('sujud-dots').innerHTML = "🟢 ⚪";
            } else {
                document.getElementById('sujud-dots').innerHTML = "🟢 🟢";
                const isFinal = (state.currR === state.totalR);
                const isEven = (state.currR % 2 === 0);

                if (isFinal) {
                    speak("تشهد و الصلاة الإبراهيمية");
                    document.getElementById('liturgy-label').innerText = "تشهد و الصلاة الإبراهيمية";
                    setTimeout(() => stopPrayer(), 6000);
                } else if (isEven) {
                    speak("تشهد");
                    document.getElementById('liturgy-label').innerText = "تشهد";
                    nextRakat();
                } else {
                    speak("الله أكبر");
                    document.getElementById('liturgy-label').innerText = "الله أكبر";
                    nextRakat();
                }
            }
        });

        function nextRakat() {
            setTimeout(() => {
                state.currR++; state.currS = 0;
                updateUI();
            }, 2500);
        }

        function updateUI() {
            document.getElementById('curr-r').innerText = state.currR;
            document.getElementById('sujud-dots').innerHTML = "⚪ ⚪";
            document.getElementById('liturgy-label').innerText = "";
        }

        function stopPrayer() {
            state.isPraying = false;
            window.speechSynthesis.cancel();
            document.getElementById('prayer-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        }

        // --- BOUSSOLE (Qibla pointer) ---
        function initQibla() {
            navigator.geolocation.getCurrentPosition(pos => {
                const latK = 21.4225, lonK = 39.8262;
                const phi = pos.coords.latitude * Math.PI / 180;
                const lambda = pos.coords.longitude * Math.PI / 180;
                const phiK = latK * Math.PI / 180;
                const lambdaK = lonK * Math.PI / 180;
                const y = Math.sin(lambdaK - lambda);
                const x = Math.cos(phi) * Math.tan(phiK) - Math.sin(phi) * Math.cos(lambdaK - lambda);
                state.qibla = Math.atan2(y, x) * 180 / Math.PI;
            });

            window.addEventListener('deviceorientationabsolute', e => {
                let heading = e.alpha || e.webkitCompassHeading;
                if (heading !== null) {
                    // La pointe (Mihrab) du tapis s'oriente vers la Mecque
                    const rotation = state.qibla - heading;
                    document.getElementById('prayer-rug').style.transform = `rotate(${-rotation}deg)`;
                }
            }, true);
        }

        window.onload = () => {
            initQibla();
            document.getElementById('p-list').innerHTML = DATA.map(p => `
                <tr class="prayer-row" onclick="startIqama('${p.n}', ${p.r})">
                    <td>${p.n}</td><td>${p.r} RAKATS</td>
                </tr>
            `).join('');
            document.body.addEventListener('click', () => { speak(""); }, {once: true});
        };
    </script>
</body>
            </html>
