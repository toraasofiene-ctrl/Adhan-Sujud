<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Adhan&Sujud</title>
    <style>
        :root {
            --emerald: #097969;
            --gold: #D4AF37;
            --gold-light: #fcf6ba;
            --black: #000000;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; 
            background: var(--emerald); color: white;
        }

        /* --- ACCUEIL --- */
        #home-screen {
            display: flex; flex-direction: column; height: 100%; padding: 15px;
            background: radial-gradient(circle, var(--emerald) 0%, #043932 100%);
            border: 8px solid var(--gold); overflow-y: auto; position: relative;
        }

        .sphere-container { position: absolute; top: 15px; right: 15px; z-index: 100; }
        .striated-sphere {
            width: 50px; height: 50px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold), #aa771c);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6), inset -2px -2px 5px rgba(0,0,0,0.5);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(0,0,0,0.1) 4px);
            cursor: pointer; border: 2px solid var(--gold-light); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #5d4300; font-size: 0.8rem;
        }

        #lang-dropdown {
            display: none; position: absolute; top: 55px; right: 0;
            background: rgba(0, 0, 0, 0.95); border: 2px solid var(--gold);
            border-radius: 12px; padding: 5px; width: 140px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .lang-option { padding: 12px; text-align: center; cursor: pointer; color: white; border-bottom: 1px solid rgba(212, 175, 55, 0.3); }
        .lang-option:last-child { border-bottom: none; }

        .header h1 { text-align: left; color: var(--gold); margin: 5px 0 15px 0; font-size: 2.2rem; letter-spacing: 3px; }

        /* BOUSSOLE */
        .qibla-area { position: relative; width: 140px; height: 160px; margin: 0 auto 15px; opacity: 0; transition: opacity 1s; }
        #prayer-rug { width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.1, 0.5, 0.1, 1); filter: drop-shadow(0 8px 15px rgba(0,0,0,0.6)); }

        .prayer-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .prayer-row { background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--gold); height: 60px; cursor: pointer; }
        .prayer-row td { text-align: center; font-size: 1.2rem; font-weight: bold; }
        .p-time { color: var(--gold); font-size: 1rem; font-family: monospace; }
        .vol-btn { font-size: 1.6rem; cursor: pointer; width: 50px; }

        .mwl-disclaimer {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-top: 20px;
            margin-bottom: 10px;
            padding: 0 10px;
            line-height: 1.3;
        }

        /* --- IQAMA (PORTRAIT AU BAS SUR LE MIHRAB) --- */
        #iqama-screen {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: url('iqama.webp') no-repeat center center;
            background-size: cover;
            flex-direction: column; justify-content: flex-end; align-items: center; text-align: center;
            padding-bottom: 10vh;
        }
        #txt-iqama-title { 
            color: var(--gold); 
            font-size: 2.8rem; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            margin: 0 0 20px 0;
            font-weight: bold;
        }
        #iqama-btn-skip { 
            background: linear-gradient(135deg, #123524, #061c12); 
            border: 2px solid var(--gold); 
            padding: 12px 45px; 
            font-weight: bold; 
            border-radius: 8px; 
            font-size: 1.3rem; 
            cursor: pointer; 
            color: var(--gold);
            text-transform: lowercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            transition: transform 0.1s;
        }
        #iqama-btn-skip:active { transform: scale(0.95); }

        /* --- PRAYER PAGE (PORTRAIT OPTIMISÉ) --- */
        #prayer-screen { display: none; position: fixed; inset: 0; background: var(--black); z-index: 3000; }
        #ui-layer { 
            position: absolute; inset: 0; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            z-index: 3001; pointer-events: none; 
            padding-top: 60px; padding-bottom: 2vh; 
        }
        .rakat-display { font-size: 16vh; font-weight: bold; color: var(--gold); line-height: 1.1; margin: 0; }
        .sujud-dots { font-size: 5vh; margin: 1vh 0; }
        #liturgy-label { font-size: 4.5vh; color: var(--white); text-align: center; font-weight: bold; min-height: 6vh; text-shadow: 0 0 15px var(--gold); padding: 0 10px; }
        
        #touch-layer { position: absolute; inset: 0; z-index: 3010; cursor: pointer; }
        
        .btn-back { 
            position: absolute; bottom: 4vh; left: 50%; transform: translateX(-50%); 
            z-index: 3020; background: rgba(34, 34, 34, 0.8); border: 1px solid var(--gold); 
            color: white; padding: 12px 35px; border-radius: 25px; cursor: pointer; font-weight: bold; 
            font-size: 1rem; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* --- ADHAN SCREEN --- */
        #adhan-screen {
            display: none; position: fixed; inset: 0; z-index: 4000;
            background: radial-gradient(circle, #043932 0%, #000 100%);
            flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="sphere-container">
            <div class="striated-sphere" onclick="toggleLang()">LANG</div>
            <div id="lang-dropdown">
                <div class="lang-option" onclick="setLang('ar')">العربية</div>
                <div class="lang-option" onclick="setLang('fr')">Français</div>
                <div class="lang-option" onclick="setLang('tr')">Türkçe</div>
                <div class="lang-option" onclick="setLang('ur')">اردو</div>
                <div class="lang-option" onclick="setLang('id')">Bahasa</div>
                <div class="lang-option" onclick="setLang('bn')">বাংলা</div>
            </div>
        </div>

        <div class="header"><h1>Adhan&Sujud</h1></div>
        
        <div id="qibla-box" class="qibla-area">
            <svg id="prayer-rug" viewBox="0 0 100 140">
                <rect x="10" y="10" width="80" height="120" rx="5" fill="#7b1113" stroke="#D4AF37" stroke-width="2"/>
                <path d="M50 15 L75 40 L75 115 L25 115 L25 40 Z" fill="#5a0d0e" stroke="#D4AF37" stroke-width="1"/>
                <path d="M50 20 L65 38 L35 38 Z" fill="#D4AF37"/>
            </svg>
        </div>

        <table class="prayer-table" id="p-list"></table>
        
        <div id="txt-mwl-disclaimer" class="mwl-disclaimer"></div>
    </div>

    <div id="iqama-screen">
        <h1 id="txt-iqama-title"></h1>
        <button id="iqama-btn-skip" onclick="skipIqama()"></button>
    </div>

    <div id="adhan-screen" onclick="stopAdhanAlert()">
        <div style="font-size: 6rem; margin-bottom: 20px;">🕌</div>
        <h1 id="txt-adhan-title" style="color: var(--gold); font-size: 4rem; margin: 0;">أذان</h1>
        <p id="txt-adhan-sub" style="color: white; font-size: 1.5rem; margin-top: 20px; opacity: 0.8;">Appuyez pour arrêter</p>
    </div>

    <div id="prayer-screen">
        <div id="ui-layer">
            <div id="p-name-active" style="font-size: 2rem; color: var(--gold); margin-bottom: 5px;">FAJR</div>
            <div class="rakat-display"><span id="curr-r">1</span>/<span id="total-r">2</span></div>
            <div id="sujud-dots" class="sujud-dots">⚪ ⚪</div>
            <div id="liturgy-label"></div>
        </div>
        <div id="touch-layer"></div>
        <button class="btn-back" id="txt-back-btn" onclick="stopPrayer()">RETOUR</button>
    </div>

    <script>
        const i18n = {
            ar: { names: ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"], iqama: "الإقامة", rakat: "ركعات", back: "رجوع", skip: "بدء الآن", adhan: "أذان", adhanSub: "اضغط للإيقاف", isteghfar: "إِسْتَغْفَارٌ", takbir: "اللهُ أَكْبَرُ", tachahoud: "التَّشَهُّدُ", final: "التَّشَهُّدُ والصَّلَاةُ الْإِبْرَاهِيمِيَّةُ", mwl: "يتم حساب المواقيت وفقًا لطريقة الحساب القياسية لرابطة العالم الإسلامي." },
            fr: { names: ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"], iqama: "Iqama", rakat: "Rakats", back: "RETOUR", skip: "commencer", adhan: "Adhan", adhanSub: "Appuyez pour arrêter", isteghfar: "Isteghfar", takbir: "Allahu Akbar", tachahoud: "Tachahoud", final: "Tachahoud Final & Prière Ibrahimiyyah", mwl: "Les horaires sont calculés selon la méthode standard de la Ligue Islamique Mondiale." },
            tr: { names: ["Sabah", "Öğle", "İkindi", "Akşam", "Yatsı"], iqama: "Kamet", rakat: "Rekat", back: "GERİ", skip: "Başlat", adhan: "Ezan", adhanSub: "Durdurmak için dokun", isteghfar: "İstiğfar", takbir: "Allahu Ekber", tachahoud: "Teşehhüd", final: "Son Teşehhüd ve Salli-Barik", mwl: "Namaz vakitleri, Müslüman Dünya Ligi standart hesaplama yöntemine göre hesaplanmaktadır." },
            ur: { names: ["فجر", "ظهر", "عصر", "مغرب", "عشاء"], iqama: "اقامت", rakat: "رکعت", back: "واپس", skip: "شروع کریں", adhan: "اذان", adhanSub: "بند کرنے کے لیے تچ کریں", isteghfar: "استغفار", takbir: "اللہ اکبر", tachahoud: "تشہد", final: "تشہد اور درود ابراہیمی", mwl: "اوقات کی صلاۃ کا حساب رابطہ عالم اسلامی کے معیاری طریقہ کار کے مطابق کیا گیا ہے۔" },
            id: { names: ["Subuh", "Zuhur", "Ashar", "Maghrib", "Isya"], iqama: "Iqama", rakat: "Rakaat", back: "KEMBALI", skip: "Mulai", adhan: "Adzan", adhanSub: "Ketuk untuk berhenti", isteghfar: "Istighfar", takbir: "Allahu Akbar", tachahoud: "Tahiyyat Awal", final: "Tahiyyat Akhir (Shalawat Ibrahimiyah)", mwl: "Waktu shalat dihitung menggunakan metode standar Liga Dunia Muslim (MWL)." },
            bn: { names: ["ফজর", "যোহর", "আসর", "মাগরিব", "এশা"], iqama: "একামত", rakat: "রাকাত", back: "ফিরে যান", skip: "শুরু করুন", adhan: "আযান", adhanSub: "বন্ধ করতে স্পর্শ করুন", isteghfar: "এস্তেগফার", takbir: "আল্লাহু আকবার", tachahoud: "তাশাহহুদ", final: "শেষ তাশাহহুদ ও দুরুদে ইব্রাহিম", mwl: "মুসলিম ওয়ার্ল্ড লিগের (MWL) আদর্শ পদ্ধতি অনুযায়ী নামাযের সময়সূচী গণনা করা হয়েছে।" }
        };

        let currentLang = localStorage.getItem('Adhan&Sujud_lang') || 'ar';
        let prayerTimes = null;
        let state = { isPraying: false, currR: 1, totalR: 0, currS: 0, lastT: 0, qibla: 0, lastAdhan: "" };
        let adhanSettings = JSON.parse(localStorage.getItem('Adhan&Sujud_vol')) || { Fajr: true, Dhuhr: true, Asr: true, Maghrib: true, Isha: true };
        let audioTimeout = null;

        const sounds = {
            iqama: new Audio('iqama.mp3'), 
            isteghfar: new Audio('isteghfar.mp3'), 
            takbir: new Audio('takbir.mp3'),
            tachahod: new Audio('tachahod.mp3'), 
            tachahod2: new Audio('tachahod-2.mp3'), 
            adhan: new Audio('adhan.mp3')
        };

        function playSound(key) {
            const s = sounds[key];
            if (s) {
                s.pause();
                s.currentTime = 0;
                s.play().catch(e => console.log("Erreur audio", key));
            }
        }

        function playSoundWithDelay(key, delay) {
            if (audioTimeout) clearTimeout(audioTimeout);
            audioTimeout = setTimeout(() => {
                playSound(key);
            }, delay);
        }

        function toggleLang() {
            const d = document.getElementById('lang-dropdown');
            d.style.display = (d.style.display === 'block') ? 'none' : 'block';
        }

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('Adhan&Sujud_lang', lang);
            document.getElementById('lang-dropdown').style.display = 'none';
            applyTranslations();
        }

        function applyTranslations() {
            const t = i18n[currentLang] || i18n.ar;
            document.getElementById('txt-iqama-title').innerText = t.iqama;
            document.getElementById('iqama-btn-skip').innerText = t.skip;
            document.getElementById('txt-back-btn').innerText = t.back;
            document.getElementById('txt-adhan-title').innerText = t.adhan;
            document.getElementById('txt-adhan-sub').innerText = t.adhanSub;
            document.getElementById('txt-mwl-disclaimer').innerText = t.mwl;
            renderTable();
        }

        function renderTable() {
            const t = i18n[currentLang] || i18n.ar;
            const pKeys = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            const rCount = [2, 4, 4, 3, 4];
            const isRTL = currentLang === 'ar' || currentLang === 'ur';
            document.getElementById('p-list').style.direction = isRTL ? 'rtl' : 'ltr';
            let html = "";
            pKeys.forEach((key, i) => {
                const time = prayerTimes ? prayerTimes[key] : "--:--";
                const isMuted = !adhanSettings[key];
                html += `<tr class="prayer-row" onclick="startIqama('${t.names[i]}', ${rCount[i]})">
                    <td class="vol-btn" onclick="toggleVol('${key}', event)">${isMuted ? '🔇' : '🔊'}</td>
                    <td class="p-time">${time}</td>
                    <td style="cursor:pointer">${t.names[i]}</td>
                    <td style="font-size:0.8rem; opacity:0.6; padding:0 10px;">${rCount[i]} ${t.rakat}</td>
                </tr>`;
            });
            document.getElementById('p-list').innerHTML = html;
        }

        function toggleVol(k, e) {
            e.stopPropagation();
            adhanSettings[k] = !adhanSettings[k];
            localStorage.setItem('Adhan&Sujud_vol', JSON.stringify(adhanSettings));
            renderTable();
        }

        async function initGeo() {
            applyTranslations();
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => fetchAPI(pos.coords.latitude, pos.coords.longitude),
                    () => fetchAPIByIP()
                );
            } else { fetchAPIByIP(); }
        }

        async function fetchAPIByIP() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                fetchAPI(data.latitude || 36.8065, data.longitude || 10.1815);
            } catch (e) { fetchAPI(36.8065, 10.1815); }
        }

        async function fetchAPI(lat, lon) {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=3`);
                const data = await res.json();
                prayerTimes = data.data.timings;
                renderTable();
                initQibla(lat, lon);
            } catch (e) { renderTable(); }
        }

        function initQibla(lat, lon) {
            const latK = 21.4225 * Math.PI / 180;
            const lonK = 39.8262 * Math.PI / 180;
            const phi = lat * Math.PI / 180;
            const L = lon * Math.PI / 180;
            const y = Math.sin(lonK - L);
            const x = Math.cos(phi) * Math.tan(latK) - Math.sin(phi) * Math.cos(lonK - L);
            state.qibla = Math.atan2(y, x) * 180 / Math.PI;
            document.getElementById('qibla-box').style.opacity = "1";
            const eventType = ('ondeviceorientationabsolute' in window) ? 'deviceorientationabsolute' : 'deviceorientation';
            window.addEventListener(eventType, handleOrientation, true);
        }

        function handleOrientation(e) {
            let compass = e.webkitCompassHeading || e.alpha;
            if (compass !== null) {
                let heading = e.webkitCompassHeading ? compass : (360 - compass);
                let rugRotation = state.qibla - heading;
                document.getElementById('prayer-rug').style.transform = `rotate(${rugRotation}deg)`;
            }
        }

        function startIqama(name, r) {
            Object.values(sounds).forEach(s => {
                s.play().then(() => s.pause()).catch(() => {});
            });

            state.totalR = r;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('iqama-screen').style.display = 'flex';
            document.getElementById('p-name-active').innerText = name;
            
            setTimeout(() => { playSound('iqama'); }, 100);
            sounds.iqama.onended = () => launch();
        }

        function skipIqama() { sounds.iqama.pause(); launch(); }

        function launch() {
            document.getElementById('iqama-screen').style.display = 'none';
            document.getElementById('prayer-screen').style.display = 'block';
            state.isPraying = true; state.currR = 1; state.currS = 0;
            document.getElementById('total-r').innerText = state.totalR;
            updateUI();
        }

        document.getElementById('touch-layer').addEventListener('touchstart', e => {
            e.preventDefault();
            const now = Date.now();
            if (now - state.lastT < 1200) return;
            state.lastT = now;
            
            state.currS++;
            const t = i18n[currentLang] || i18n.ar;
            
            if (state.currS === 1) {
                // Sous-titrage immédiat à la touche
                document.getElementById('liturgy-label').innerText = t.isteghfar;
                document.getElementById('sujud-dots').innerHTML = "🟢 ⚪";
                
                // Signal sonore après 3 secondes
                playSoundWithDelay('isteghfar', 3000);
                
            } else if (state.currS === 2) {
                document.getElementById('sujud-dots').innerHTML = "🟢 🟢";
                const isFinal = (state.currR === state.totalR);
                
                if (isFinal) {
                    // Sous-titrage immédiat à la touche
                    document.getElementById('liturgy-label').innerText = t.final;
                    
                    // Signal sonore après 3 secondes
                    playSoundWithDelay('tachahod2', 3000);
                    setTimeout(() => stopPrayer(), 11000); 
                } else {
                    const isEven = (state.currR % 2 === 0);
                    if (isEven) {
                        document.getElementById('liturgy-label').innerText = t.tachahoud;
                        playSoundWithDelay('tachahod', 3000);
                    } else {
                        document.getElementById('liturgy-label').innerText = t.takbir;
                        playSoundWithDelay('takbir', 3000);
                    }
                    setTimeout(() => { state.currR++; state.currS = 0; updateUI(); }, 5500);
                }
            }
        });

        function updateUI() {
            document.getElementById('curr-r').innerText = state.currR;
            document.getElementById('sujud-dots').innerHTML = "⚪ ⚪";
            document.getElementById('liturgy-label').innerText = "";
        }

        function stopPrayer() {
            state.isPraying = false;
            if (audioTimeout) clearTimeout(audioTimeout);
            Object.values(sounds).forEach(s => { s.pause(); s.currentTime = 0; });
            document.getElementById('prayer-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
        }

      function checkAdhan() {
            if (state.isPraying || !prayerTimes) return;
            const now = new Date();
            const cur = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].forEach(k => {
                if (prayerTimes[k] === cur && state.lastAdhan !== cur && adhanSettings[k]) {
                    state.lastAdhan = cur;
                    document.getElementById('adhan-screen').style.display = 'flex';
                    playSound('adhan');

                    // --- ENVOI DE LA NOTIFICATION NATIVE AU TÉLÉPHONE ---
                    if (window.AndroidInterface) {
                        window.AndroidInterface.triggerAdhanNotification(
                            "C'est l'heure de l'Adhan", 
                            "Prière du " + k
                        );
                    }
                }
            });
        }

        function stopAdhanAlert() {
            sounds.adhan.pause();
            document.getElementById('adhan-screen').style.display = 'none';
        }

        window.onload = () => {
            initGeo();
            setInterval(checkAdhan, 30000);
            document.body.addEventListener('click', () => { 
                Object.values(sounds).forEach(s => { s.play().then(()=>s.pause()).catch(()=>{}) });
            }, {once: true});
        };
    </script>
</body>
</html>
