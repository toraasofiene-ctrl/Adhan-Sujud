<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Khanzab Pro</title>
    <style>
        :root {
            --emerald: #097969;
            --gold: #D4AF37;
            --gold-light: #fcf6ba;
            --black: #000000;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: var(--emerald); color: white; }

        /* --- ACCUEIL --- */
        #home-screen { display: flex; flex-direction: column; height: 100%; padding: 15px; background: radial-gradient(circle, var(--emerald) 0%, #043932 100%); border: 8px solid var(--gold); overflow-y: auto; position: relative; }

        .sphere-container { position: absolute; top: 15px; right: 15px; z-index: 100; }
        .striated-sphere { width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold), #aa771c); box-shadow: 0 4px 15px rgba(0,0,0,0.6); cursor: pointer; border: 2px solid var(--gold-light); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #5d4300; font-size: 0.8rem; }

        #lang-dropdown { display: none; position: absolute; top: 55px; right: 0; background: rgba(0, 0, 0, 0.95); border: 2px solid var(--gold); border-radius: 12px; padding: 5px; width: 140px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .lang-option { padding: 12px; text-align: center; cursor: pointer; color: white; border-bottom: 1px solid rgba(212, 175, 55, 0.3); }

        .header h1 { text-align: center; color: var(--gold); margin: 5px 0 15px 0; font-size: 2.2rem; letter-spacing: 3px; }

        .qibla-area { position: relative; width: 140px; height: 160px; margin: 0 auto 15px; }
        #prayer-rug { width: 100%; height: 100%; transition: transform 0.5s ease-out; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.6)); }

        .prayer-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .prayer-row { background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--gold); height: 60px; }
        .prayer-row td { text-align: center; font-size: 1.2rem; font-weight: bold; }
        .p-time { color: var(--gold); font-family: monospace; }
        .vol-btn { font-size: 1.6rem; cursor: pointer; width: 50px; }

        /* --- SUIVI --- */
        #prayer-screen { display: none; position: fixed; inset: 0; background: var(--black); z-index: 3000; }
        #ui-layer { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3001; pointer-events: none; }
        .rakat-display { font-size: 30vh; font-weight: bold; color: var(--gold); line-height: 1; }
        .sujud-dots { font-size: 8vh; margin: 1vh 0; }
        #liturgy-label { font-size: 6vh; color: var(--white); text-align: center; font-weight: bold; min-height: 8vh; text-shadow: 0 0 15px var(--gold); padding: 0 20px; }
        
        #touch-layer { position: absolute; inset: 0; z-index: 3010; cursor: pointer; }
        .btn-back { position: absolute; top: 15px; left: 15px; z-index: 3020; background: #222; border: 1px solid var(--gold); color: white; padding: 12px 20px; border-radius: 8px; }

        /* Bouton Stop Iqama */
        #iqama-stop-btn {
            position: absolute; bottom: 20px; right: 20px; z-index: 3030;
            background: var(--gold); color: black; border: none; padding: 15px 30px;
            font-weight: bold; border-radius: 50px; font-size: 1.2rem; cursor: pointer;
            display: none; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        /* --- ADHAN --- */
        #adhan-screen { display: none; position: fixed; inset: 0; z-index: 4000; background: #000; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="sphere-container">
            <div class="striated-sphere" onclick="toggleLang()">LANG</div>
            <div id="lang-dropdown">
                <div class="lang-option" onclick="setLang('ar')">العربية</div>
                <div class="lang-option" onclick="setLang('fr')">Français</div>
                <div class="lang-option" onclick="setLang('tr')">Türkçe</div>
                <div class="lang-option" onclick="setLang('ur')">اردو</div>
                <div class="lang-option" onclick="setLang('id')">Bahasa</div>
                <div class="lang-option" onclick="setLang('bn')">বাংলা</div>
            </div>
        </div>
        <div class="header"><h1>KHANZAB</h1></div>
        <div class="qibla-area">
            <svg id="prayer-rug" viewBox="0 0 100 140">
                <rect x="10" y="10" width="80" height="120" rx="5" fill="#7b1113" stroke="#D4AF37" stroke-width="2"/>
                <path d="M50 15 L75 40 L75 115 L25 115 L25 40 Z" fill="#5a0d0e" stroke="#D4AF37" stroke-width="1"/>
                <path d="M50 20 L65 38 L35 38 Z" fill="#D4AF37"/>
            </svg>
        </div>
        <table class="prayer-table" id="p-list"></table>
    </div>

    <div id="adhan-screen" onclick="stopAdhanAlert()">
        <div style="font-size: 6rem;">🕌</div>
        <h1 id="txt-adhan-title" style="color: var(--gold); font-size: 3rem;">أذان</h1>
    </div>

    <div id="prayer-screen">
        <button class="btn-back" id="txt-back-btn" onclick="stopPrayer()">RETOUR</button>
        
        <!-- Bouton pour arrêter l'Iqama et commencer directement -->
        <button id="iqama-stop-btn" onclick="skipIqama()"></button>

        <div id="ui-layer">
            <div id="p-name-active" style="font-size: 2rem; color: var(--gold); text-transform: uppercase;"></div>
            <div class="rakat-display"><span id="curr-r">1</span>/<span id="total-r">2</span></div>
            <div id="sujud-dots" class="sujud-dots">⚪ ⚪</div>
            <div id="liturgy-label"></div>
        </div>
        <div id="touch-layer"></div>
    </div>

    <script>
        const i18n = {
            ar: { names: ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"], rakat: "ركعات", back: "رجوع", skip: "بدء الصلاة", adhan: "أذان", isteghfar: "رَبِّ اغْفِرْ لِي", takbir: "اللهُ أَكْبَر", tachahod: "التَّشَهُّدّ", final: "التَّشَهُّدُّ وَالصَّلَاةُ الإِبْرَاهِيمِيَّة" },
            fr: { names: ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"], rakat: "Rakats", back: "RETOUR", skip: "Démarrer", adhan: "Adhan", isteghfar: "Rabbi ghfir li", takbir: "Allahu Akbar", tachahod: "Tachahoud", final: "Tachahoud Final" },
            tr: { names: ["Sabah", "Öğle", "İkindi", "Akşam", "Yatsı"], rakat: "Rekat", back: "GERİ", skip: "Başlat", adhan: "Ezan", isteghfar: "Rabbim beni bağışla", takbir: "Allahu Ekber", tachahod: "Teşehhüd", final: "Son Teşehhüd" },
            ur: { names: ["فجر", "ظہر", "عصر", "مغرب", "عشاء"], rakat: "رکعت", back: "واپس", skip: "شروع کریں", adhan: "اذان", isteghfar: "رب اغفر لي", takbir: "اللہ اکبر", tachahod: "تشہد", final: "تشہد اور درود" },
            id: { names: ["Subuh", "Zuhur", "Ashar", "Maghrib", "Isya"], rakat: "Rakaat", back: "KEMBALI", skip: "Mulai", adhan: "Adzan", isteghfar: "Robbighfirlii", takbir: "Allahu Akbar", tachahod: "Tahiyyat awal", final: "Tahiyyat Akhir" },
            bn: { names: ["ফজর", "যোহর", "আসর", "মাগরিব", "এশা"], rakat: "রাকাত", back: "ফিরে যান", skip: "শুরু করুন", adhan: "আযান", isteghfar: "রব্বিগফিরলি", takbir: "আল্লাহু আকবার", tachahod: "তাশাহহুদ", final: "তাশাহহুদ ও দুরুদ" }
        };

        let currentLang = localStorage.getItem('khanzab_lang') || 'ar';
        let prayerTimes = null;
        let state = { isPraying: false, currR: 1, totalR: 0, currS: 0, lastT: 0, qibla: 0, isIqamaPlaying: false };
        let adhanSettings = JSON.parse(localStorage.getItem('khanzab_vol')) || { Fajr: true, Dhuhr: true, Asr: true, Maghrib: true, Isha: true };

        const sounds = {
            iqama: new Audio('iqama.mp3'),
            isteghfar: new Audio('isteghfar.mp3'),
            takbir: new Audio('takbir.mp3'),
            tachahod: new Audio('tachahod.mp3'),
            tachahod2: new Audio('tachahod-2.mp3'),
            adhan: new Audio('adhan.mp3')
        };

        function unlockAudio() {
            Object.values(sounds).forEach(s => { s.play().then(() => s.pause()).catch(() => {}); });
        }

        function playSound(key) {
            const s = sounds[key];
            if (s) { s.pause(); s.currentTime = 0; s.play().catch(e => console.log("Audio Error:", key)); }
        }

        function toggleLang() { const d = document.getElementById('lang-dropdown'); d.style.display = (d.style.display === 'block') ? 'none' : 'block'; }
        
        function setLang(lang) { 
            currentLang = lang; 
            localStorage.setItem('khanzab_lang', lang); 
            document.getElementById('lang-dropdown').style.display = 'none'; 
            unlockAudio();
            applyTranslations(); 
        }

        function applyTranslations() {
            const t = i18n[currentLang] || i18n.ar;
            document.getElementById('txt-back-btn').innerText = t.back;
            document.getElementById('iqama-stop-btn').innerText = t.skip;
            document.getElementById('txt-adhan-title').innerText = t.adhan;
            renderTable();
        }

        function renderTable() {
            const t = i18n[currentLang] || i18n.ar;
            const pKeys = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            const rCount = [2, 4, 4, 3, 4];
            const isRTL = currentLang === 'ar' || currentLang === 'ur';
            document.getElementById('p-list').style.direction = isRTL ? 'rtl' : 'ltr';
            let html = "";
            pKeys.forEach((key, i) => {
                const time = prayerTimes ? prayerTimes[key] : "--:--";
                const isMuted = !adhanSettings[key];
                html += `<tr class="prayer-row">
                    <td class="vol-btn" onclick="toggleVol('${key}', event)">${isMuted ? '🔇' : '🔊'}</td>
                    <td class="p-time">${time}</td>
                    <td onclick="startPrayer(${i}, ${rCount[i]})" style="cursor:pointer; padding:0 15px;">${t.names[i]}</td>
                    <td style="font-size:0.8rem; opacity:0.6; padding:0 10px;">${rCount[i]} ${t.rakat}</td>
                </tr>`;
            });
            document.getElementById('p-list').innerHTML = html;
        }

        function toggleVol(k, e) { e.stopPropagation(); adhanSettings[k] = !adhanSettings[k]; localStorage.setItem('khanzab_vol', JSON.stringify(adhanSettings)); renderTable(); }

        async function initGeo() {
            applyTranslations();
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => fetchAPI(pos.coords.latitude, pos.coords.longitude), () => fetchAPI(36.8, 10.1));
            } else { fetchAPI(36.8, 10.1); }
        }

        async function fetchAPI(lat, lon) {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`);
                const data = await res.json();
                prayerTimes = data.data.timings;
                renderTable();
                initQibla(lat, lon);
            } catch (e) { renderTable(); }
        }

        function initQibla(lat, lon) {
            const latK = 21.4225 * Math.PI / 180, lonK = 39.8262 * Math.PI / 180, phi = lat * Math.PI / 180, L = lon * Math.PI / 180;
            const y = Math.sin(lonK - L), x = Math.cos(phi) * Math.tan(latK) - Math.sin(phi) * Math.cos(lonK - L);
            state.qibla = Math.atan2(y, x) * 180 / Math.PI;
            const ev = ('ondeviceorientationabsolute' in window) ? 'deviceorientationabsolute' : 'deviceorientation';
            window.addEventListener(ev, e => {
                let h = e.webkitCompassHeading || e.alpha;
                if (h !== null) { let head = e.webkitCompassHeading ? h : (360 - h); document.getElementById('prayer-rug').style.transform = `rotate(${state.qibla - head}deg)`; }
            }, true);
        }

        // --- LOGIQUE PRAYER ---
        function startPrayer(idx, r) {
            unlockAudio();
            state.totalR = r;
            state.isPraying = true;
            state.currR = 1;
            state.currS = 0;
            state.isIqamaPlaying = true;
            
            const t = i18n[currentLang];
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('prayer-screen').style.display = 'block';
            document.getElementById('p-name-active').innerText = t.names[idx];
            document.getElementById('total-r').innerText = r;
            document.getElementById('iqama-stop-btn').style.display = 'block';
            
            updateUI();
            
            playSound('iqama');
            sounds.iqama.onended = () => skipIqama();

            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        }

        function skipIqama() { 
            sounds.iqama.pause(); 
            sounds.iqama.currentTime = 0;
            state.isIqamaPlaying = false;
            document.getElementById('iqama-stop-btn').style.display = 'none';
        }

        document.getElementById('touch-layer').addEventListener('touchstart', e => {
            e.preventDefault();
            // Si l'Iqama joue, on ne compte pas les Sujuds
            if (state.isIqamaPlaying) return;

            const now = Date.now();
            if (now - state.lastT < 1100) return;
            state.lastT = now;
            state.currS++;
            
            const t = i18n[currentLang] || i18n.ar;
            if (state.currS === 1) { 
                playSound('isteghfar'); 
                document.getElementById('liturgy-label').innerText = t.isteghfar; 
                document.getElementById('sujud-dots').innerHTML = "🟢 ⚪"; 
            }
            else if (state.currS === 2) {
                document.getElementById('sujud-dots').innerHTML = "🟢 🟢";
                if (state.currR === state.totalR) { 
                    playSound('tachahod2'); 
                    document.getElementById('liturgy-label').innerText = t.final; 
                    setTimeout(() => stopPrayer(), 8000); 
                }
                else {
                    const isEven = (state.currR % 2 === 0);
                    if (isEven) { playSound('tachahod'); document.getElementById('liturgy-label').innerText = t.tachahoud; }
                    else { playSound('takbir'); document.getElementById('liturgy-label').innerText = t.takbir; }
                    setTimeout(() => { state.currR++; state.currS = 0; updateUI(); }, 2500);
                }
            }
        });

        function updateUI() { 
            document.getElementById('curr-r').innerText = state.currR; 
            document.getElementById('sujud-dots
