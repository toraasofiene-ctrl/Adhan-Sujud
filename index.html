<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correction Layout & Suivi</title>
    <style>
        /* --- FIX 1 : HEADER (TITRE & LANGUE) --- */
        header {
            display: flex;
            justify-content: space-between; /* Espace entre les éléments */
            align-items: center;
            padding: 10px 5%;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }

        .site-title {
            margin: 0;
            flex: 1; /* Prend l'espace disponible à gauche */
            text-align: left;
            font-size: 1.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Coupe proprement si le titre est trop long */
        }

        .lang-selector {
            margin-left: 20px; /* Sécurité pour éviter le contact */
            padding: 5px 15px;
            background: #007bff;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        /* --- FIX 2 : PAGE DE SUIVI (ANTI-MUET) --- */
        #tracking-container {
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            font-family: sans-serif;
        }

        .tracking-status {
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            min-height: 100px;
        }

        /* États visuels pour ne jamais laisser l'utilisateur sans info */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .error-msg { color: #dc3545; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Header Corrigé -->
    <header>
        <h1 class="site-title">Mon Super Site E-commerce</h1>
        <div class="lang-selector">FR | EN</div>
    </header>

    <!-- Page de Suivi Corrigée -->
    <div id="tracking-container">
        <h2>Suivi de votre commande</h2>
        <div id="tracking-content" class="tracking-status">
            <!-- État initial : Chargement (évite la page "muette") -->
            <div id="loader" class="loader"></div>
            <p id="status-text">Recherche des informations...</p>
        </div>
    </div>

    <script>
        // Simulation d'un appel de suivi (API)
        function fetchTracking() {
            const content = document.getElementById('status-text');
            const loader = document.getElementById('loader');

            // On simule un délai de réponse
            setTimeout(() => {
                try {
                    // Simulation d'une erreur ou d'un résultat vide
                    let dataFound = false; // Changez à true pour tester le succès

                    if (dataFound) {
                        loader.classList.add('hidden');
                        content.innerHTML = "✅ Votre colis est en cours de livraison.";
                    } else {
                        throw new Error("Aucune donnée trouvée");
                    }
                } catch (error) {
                    // Correction du "problème muet" : Toujours afficher une alternative
                    loader.classList.add('hidden');
                    content.classList.add('error-msg');
                    content.innerHTML = "⚠️ Impossible de récupérer les informations pour le moment. Veuillez réessayer plus tard ou contacter le support.";
                }
            }, 2000);
        }

        // Lancement au chargement de la page
        window.onload = fetchTracking;
    </script>

</body>
</html>
